  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'es';
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    window.speechSynthesis.speak(utterance);
  }

  function playAudio(dataUri) {
    window.speechSynthesis.cancel();
    var audio = new Audio(dataUri);
    audio.play().catch(function(){});
  }

  // Fullscreen on tap for older tablets (double-tap to fullscreen)
  var fsEl = document.documentElement;
  function toggleFS() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      if (fsEl.requestFullscreen) fsEl.requestFullscreen();
      else if (fsEl.webkitRequestFullscreen) fsEl.webkitRequestFullscreen();
    }
  }

  // Click handler — reproduce audio grabado o habla el texto
  grid.addEventListener('click', function(e) {
    var cell = e.target.closest('.c');
    if (!cell || cell.classList.contains('empty')) return;
    var idx = parseInt(cell.getAttribute('data-i'));
    if (audioData[idx]) {
      playAudio(audioData[idx]);
      return;
    }
    var label = cell.querySelector('.lbl');
    if (label && label.textContent.trim()) {
      speak(label.textContent.trim());
    }
  });

  // Long-press → fullscreen
  var pressTimer = null;
  grid.addEventListener('touchstart', function(e) {
    pressTimer = setTimeout(toggleFS, 800);
  });
  grid.addEventListener('touchend', function() { clearTimeout(pressTimer); });
  grid.addEventListener('touchmove', function() { clearTimeout(pressTimer); });
})();
</script>
</body>
</html>
