<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>COFRE DE SONIDOS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{font-family:"Segoe UI","Comic Sans MS",sans-serif;background:linear-gradient(135deg,#1a0a2e 0%,#16213e 50%,#0a0a1a 100%);display:flex;justify-content:center;align-items:center;padding:12px;min-height:100vh}
#app{background:rgba(255,255,255,0.95);border-radius:28px;padding:14px 18px;width:75vw;max-width:600px;min-width:320px;height:88vh;max-height:720px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);display:flex;flex-direction:column;justify-content:space-between}
#hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
#hd h1{font-size:clamp(1.6rem,5vw,2.8rem);background:linear-gradient(45deg,#f093fb,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;text-shadow:2px 2px 0 rgba(240,147,251,0.3)}
#badge{background:#f0f0f0;padding:4px 12px;border-radius:20px;font-weight:700;color:#555;font-size:.75rem;white-space:nowrap}
#chArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;min-height:0;-webkit-tap-highlight-color:transparent;perspective:600px}
#chImg{width:auto;height:min(220px,35vh);max-width:92%;object-fit:contain;transition:opacity .25s;filter:drop-shadow(0 10px 30px rgba(0,0,0,0.3))}
.chQ{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:clamp(1.5rem,4vw,2.2rem);z-index:5;pointer-events:none;filter:drop-shadow(0 0 8px rgba(255,40,40,0.9)) drop-shadow(0 0 20px rgba(255,60,60,0.5));animation:qP 1.5s ease-in-out infinite}
@keyframes qP{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.15)}}
.skW{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:6}
.sk{position:absolute;width:3px;height:3px;background:#FFD700;border-radius:50%;animation:sA 2s ease-in-out infinite;box-shadow:0 0 6px #FFD700,0 0 12px rgba(255,215,0,0.5)}
.sk.d1{animation-delay:.6s}.sk.d2{animation-delay:1.2s}.sk.d3{animation-delay:1.8s}
@keyframes sA{0%,100%{opacity:0;transform:scale(0) translateY(0)}50%{opacity:1;transform:scale(1.5) translateY(-8px)}}
#inst{font-size:clamp(.8rem,1.5vw,1rem);color:#666;margin:4px 0;font-weight:500;min-height:1.5em}
.hidden{display:none!important}
#opts{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:2px 0 4px}
.card{background:#fff;border:3px solid #e0e0e0;border-radius:14px;padding:6px 3px;cursor:pointer;transition:all .12s;user-select:none;-webkit-tap-highlight-color:transparent}
.card:hover{border-color:#667eea;transform:translateY(-2px);box-shadow:0 4px 14px rgba(102,126,234,0.2)}
.card:active{transform:translateY(0);border-color:#764ba2;background:#f8f6ff}
.card .e{font-size:clamp(1.8rem,4vw,2.8rem);display:block;line-height:1.2}
.card .l{font-size:clamp(.7rem,1.3vw,.9rem);font-weight:600;color:#333;display:block}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;justify-content:center;align-items:center;z-index:1000;animation:fade .25s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.mb{background:#fff;border-radius:24px;padding:28px 20px;max-width:360px;width:90%;text-align:center;animation:bounce .4s}
@keyframes bounce{0%{transform:scale(.5);opacity:0}65%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
.mb h2{font-size:1.6rem;margin:8px 0}
.mb p{font-size:1.05rem;color:#555;margin:4px 0 14px}
.mb button{background:linear-gradient(45deg,#667eea,#764ba2);color:#fff;border:none;padding:11px 28px;font-size:1rem;font-weight:700;border-radius:50px;cursor:pointer;transition:transform .15s;box-shadow:0 4px 18px rgba(102,126,234,.4)}
.mb button:hover{transform:scale(1.06)}
.mb.err h2{font-size:3rem}
.mb.err button{background:linear-gradient(45deg,#f093fb,#f5576c);box-shadow:0 4px 18px rgba(245,87,108,.4)}
#cfwrap{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;z-index:1001}
.cp2{position:absolute;left:var(--x);top:-20px;width:var(--s);height:var(--s);background:var(--c);border-radius:var(--r);animation:cfal var(--d) linear var(--delay) forwards}
@keyframes cfal{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}30%{opacity:1}100%{transform:translateY(110vh) rotate(var(--rot)) scale(.5);opacity:0}}
#done{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a0a2e,#16213e);display:flex;justify-content:center;align-items:center;z-index:2000;animation:fade .5s}
.dc{background:#fff;border-radius:24px;padding:28px 20px;text-align:center;max-width:400px;width:90%}
.dc .big{font-size:3.5rem;margin:4px 0}
.dc h2{font-size:1.6rem;margin:10px 0;color:#333}
.dc p{font-size:1.05rem;color:#555}
.dc button{background:linear-gradient(45deg,#f093fb,#f5576c);color:#fff;border:none;padding:11px 28px;font-size:1rem;font-weight:700;border-radius:50px;cursor:pointer;margin-top:14px;transition:transform .15s}
.dc button:hover{transform:scale(1.06)}
@media(max-width:500px){#app{width:94vw;height:86vh;padding:10px 6px}#opts{gap:4px}#chImg{height:min(170px,28vh)}}
@media(max-height:600px){#app{height:97vh;padding:4px 6px}#chImg{height:min(130px,22vh)}}
@keyframes emUp{0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}30%{transform:translate(-50%,-50%) scale(.9)}50%{transform:translate(-50%,-60%) scale(1.1)}100%{opacity:1;transform:translate(-50%,-120%) scale(1)}}
</style></head><body>
