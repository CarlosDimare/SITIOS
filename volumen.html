<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bajo el Mar - Medidor de Voz</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Fredoka',sans-serif;background:#051020}
#ocean{position:fixed;top:0;left:0;width:100%;height:100%;display:block;z-index:0}
.z-over{position:relative;z-index:10}
.z-mid{z-index:5}

.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s ease,transform .5s ease;
  pointer-events:none;
}
.screen.hide{opacity:0;transform:scale(.92)}
.screen.show{opacity:1;transform:scale(1);pointer-events:auto}

.card{
  background:rgba(6,20,40,.82);
  backdrop-filter:blur(8px);
  border:2px solid rgba(34,211,238,.22);
  border-radius:28px;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}

.vol-fill{transition:height .06s linear}

/* Draggable threshold */
#threshold-line{
  cursor:ns-resize;
  user-select:none;
  touch-action:none;
  transition:none;
}
#threshold-line::before{
  content:'';position:absolute;top:-12px;bottom:-12px;left:-16px;right:-8px;
}

.cd-bar{transition:width .4s ease}

@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,211,238,.5)}70%{box-shadow:0 0 0 28px rgba(34,211,238,0)}}
.mic-pulse{animation:micPulse 2.2s infinite}
@keyframes floatTag{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.float-tag{animation:floatTag 3s ease-in-out infinite}
</style>
</head>
<body>

<canvas id="ocean"></canvas>

<!-- ==================== START ==================== -->
<div id="screen-start" class="screen show z-over">
  <div class="card p-8 w-[90%] max-w-sm text-center">
    <div class="w-28 h-28 mx-auto mb-5 rounded-full flex items-center justify-center bg-cyan-500/10 border-2 border-cyan-400 mic-pulse">
      <svg class="w-14 h-14 text-cyan-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
      </svg>
    </div>
    <h2 class="text-3xl font-bold text-cyan-200 mb-1">Buenas burbujas</h2>
    <p class="text-sm text-slate-400/80 mb-5">Elegí tu micrófono y empezá</p>
    <div class="mb-4 text-left">
      <label class="text-xs uppercase tracking-wider text-cyan-400/60 font-semibold block mb-1">Dispositivo</label>
      <select id="device-select" class="w-full bg-blue-900/60 border border-cyan-700/30 rounded-xl px-3 py-2.5 text-sm text-cyan-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-cyan-400/30"></select>
    </div>
    <button id="btn-start" class="w-full bg-gradient-to-r from-cyan-400 to-sky-400 hover:from-cyan-300 hover:to-sky-300 active:scale-95 text-blue-950 font-bold py-4 px-8 rounded-2xl transition-all text-lg shadow-lg shadow-cyan-500/20 focus:outline-none focus:ring-4 focus:ring-cyan-400/40">
      🐬 Sumergirse
    </button>
    <div id="mic-error" class="hidden mt-3 text-rose-400 text-sm font-semibold" role="alert"></div>
  </div>
</div>

<!-- ==================== MONITOR ==================== -->
<div id="screen-monitor" class="screen hide z-over">
  <div class="flex flex-col items-center gap-4 z-mid">
    <!-- Barra de agua centrada y ancha -->
    <div class="relative w-24 h-72 md:w-28 md:h-96 bg-blue-950/40 rounded-2xl border-2 border-cyan-500/20 overflow-hidden shadow-inner shadow-cyan-900/20" id="bar-container">
      <div id="vol-fill" class="vol-fill absolute bottom-0 inset-x-0 bg-gradient-to-t from-cyan-600 via-emerald-400 to-amber-300 rounded-b-2xl" style="height:5%"></div>
      <!-- Línea de umbral draggable -->
      <div id="threshold-line" class="absolute inset-x-0 z-10 pointer-events-auto" style="bottom:70%">
        <div class="relative flex items-center">
          <div class="flex-1 border-t-2.5 border-dashed border-rose-400/70"></div>
          <span id="tope-label" class="bg-rose-600 text-[10px] font-bold px-2 py-0.5 rounded-full ml-1 shadow-lg shadow-rose-900/40 whitespace-nowrap cursor-grab active:cursor-grabbing float-tag">
            ☝ Tope
          </span>
        </div>
      </div>
    </div>

    <!-- % volumen -->
    <div class="flex items-center gap-3">
      <span id="vol-pct" class="text-2xl font-black text-cyan-300 tabular-nums drop-shadow-[0_0_8px_rgba(34,211,238,.3)]">0%</span>
      <span id="label-device" class="text-[10px] text-cyan-500/40 font-mono"></span>
    </div>

    <!-- Delfín contento/triste según volumen -->
    <div id="dolphin" class="transition-all duration-300">
      <svg class="w-32 h-28 md:w-40 md:h-36 drop-shadow-[0_0_24px_rgba(59,130,246,.2)]" viewBox="0 0 200 180" id="dolphin-svg">
        <!-- Cuerpo -->
        <path d="M 25 100 C 40 55 90 45 130 70 C 155 85 175 80 195 90 C 175 100 155 100 130 110 C 90 140 40 130 25 100 Z" fill="#3B82F6" stroke="#2563EB" stroke-width="4"/>
        <!-- Panza -->
        <path d="M 30 105 C 50 130 90 133 125 112 C 136 105 145 103 160 100 C 145 97 130 98 120 100 C 85 115 45 110 30 105 Z" fill="#93C5FD"/>
        <!-- Aleta dorsal -->
        <path d="M 75 62 L 90 22 L 105 58 Z" fill="#1D4ED8" stroke="#1E40AF" stroke-width="3" stroke-linejoin="round"/>
        <!-- Aleta pectoral -->
        <path d="M 110 110 Q 125 135 105 140 Q 100 125 110 110 Z" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
        <!-- Cola -->
        <path d="M 25 100 L 5 75 L 0 100 L 5 125 Z" fill="#1D4ED8" stroke="#1E40AF" stroke-width="3" stroke-linejoin="round"/>
        <!-- Ojo -->
        <circle cx="120" cy="78" r="8" fill="white" stroke="#1E3A8A" stroke-width="2"/>
        <circle cx="123" cy="78" r="4.5" fill="#1E3A8A"/>
        <circle cx="121" cy="75" r="2" fill="white"/>
        <!-- Sonrisa / mueca (se cambia con clase) -->
        <path id="dolphin-mouth" d="M 143 92 Q 152 103 165 90" stroke="#1E3A8A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <!-- Rubor mejilla -->
        <ellipse id="dolphin-blush" cx="135" cy="95" rx="10" ry="6" fill="#F472B6" opacity="0"/>
      </svg>
    </div>
  </div>

  <!-- Botón cambiar/reiniciar sutíl -->
  <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-mid flex gap-2">
    <button id="btn-devices" class="text-[10px] bg-blue-900/30 hover:bg-blue-800/50 border border-blue-700/20 rounded-xl px-3 py-1.5 text-cyan-400/60 hover:text-cyan-300 transition-all">🔌 Cambiar</button>
    <button id="btn-reset" class="text-[10px] bg-blue-900/30 hover:bg-blue-800/50 border border-blue-700/20 rounded-xl px-3 py-1.5 text-cyan-400/60 hover:text-cyan-300 transition-all">🔄</button>
  </div>
</div>

<!-- ==================== ALERTA ==================== -->
<div id="screen-alert" class="screen hide z-over">
  <div class="card p-8 w-[90%] max-w-md text-center flex flex-col items-center gap-4">
    <div class="absolute -top-4 -left-4 -right-4 h-12 bg-gradient-to-r from-transparent via-yellow-400/10 to-transparent blur-xl rounded-full pointer-events-none"></div>

    <!-- Delfín triste -->
    <svg class="w-36 h-32 md:w-44 md:h-40 drop-shadow-[0_0_20px_rgba(59,130,246,.2)]" viewBox="0 0 200 180">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; -3,-5; 2,-8; -2,-3; 0,0" dur=".8s" repeatCount="indefinite"/>
        <path d="M 25 100 C 40 55 90 45 130 70 C 155 85 175 80 195 90 C 175 100 155 100 130 110 C 90 140 40 130 25 100 Z" fill="#3B82F6" stroke="#2563EB" stroke-width="4"/>
        <path d="M 30 105 C 50 130 90 133 125 112 C 136 105 145 103 160 100 C 145 97 130 98 120 100 C 85 115 45 110 30 105 Z" fill="#93C5FD"/>
        <path d="M 75 62 L 90 22 L 105 58 Z" fill="#1D4ED8" stroke="#1E40AF" stroke-width="3" stroke-linejoin="round"/>
        <path d="M 110 110 Q 125 135 105 140 Q 100 125 110 110 Z" fill="#2563EB" stroke="#1D4ED8" stroke-width="2"/>
        <path d="M 25 100 L 5 75 L 0 100 L 5 125 Z" fill="#1D4ED8" stroke="#1E40AF" stroke-width="3" stroke-linejoin="round"/>
        <circle cx="120" cy="78" r="8" fill="white" stroke="#1E3A8A" stroke-width="2"/>
        <circle cx="123" cy="78" r="4.5" fill="#1E3A8A"/>
        <circle cx="121" cy="75" r="2" fill="white"/>
        <!-- Boca triste -->
        <path d="M 148 100 Q 152 95 163 103" stroke="#1E3A8A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <!-- Lágrima -->
        <ellipse cx="112" cy="88" rx="3" ry="5" fill="#93C5FD" opacity=".6">
          <animate attributeName="cy" values="88;98;88" dur="1.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".6;0;.6" dur="1.2s" repeatCount="indefinite"/>
        </ellipse>
      </g>
    </svg>

    <h3 class="text-3xl md:text-4xl font-extrabold text-yellow-300 drop-shadow-[0_0_10px_rgba(253,224,71,.2)]">Demasiado ruido</h3>
    <p id="alert-vol-text" class="text-slate-400/70 text-sm">El delfín se entristece. Silencio para alegrarlo.</p>

    <div class="flex flex-col items-center gap-2">
      <div class="flex items-center gap-3">
        <div id="cd-bubbles" class="flex gap-1"></div>
        <span id="cd-number" class="text-5xl font-black text-cyan-300 tabular-nums drop-shadow-[0_0_10px_rgba(34,211,238,.3)]">5</span>
      </div>
      <div class="w-full max-w-[200px] h-2 bg-blue-900/50 rounded-full overflow-hidden">
        <div id="cd-bar" class="cd-bar h-full bg-gradient-to-r from-cyan-400 to-emerald-400 rounded-full" style="width:100%"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ======================== DOM ========================
const $ = id => document.getElementById(id);
const screenStart = $('screen-start');
const screenMonitor = $('screen-monitor');
const screenAlert = $('screen-alert');
const canvas = $('ocean');
const ctx = canvas.getContext('2d');
const btnStart = $('btn-start');
const micError = $('mic-error');
const deviceSelect = $('device-select');
const labelDevice = $('label-device');
const volFill = $('vol-fill');
const volPct = $('vol-pct');
const dolphinMouth = $('dolphin-mouth');
const dolphinBlush = $('dolphin-blush');
const barContainer = $('bar-container');
const thresholdLine = $('threshold-line');
const topeLabel = $('tope-label');
const cdNumber = $('cd-number');
const cdBubbles = $('cd-bubbles');
const cdBar = $('cd-bar');
const btnDevices = $('btn-devices');
const btnReset = $('btn-reset');

// ======================== STATE ========================
let audioCtx, analyser, mediaStream;
let currentVolume = 0;
let threshold = 65;
let isAlert = false;
let alertTimer = null;
let countdown = 5;
let isMonitoring = false;
let devices = [];
let selectedDeviceId = null;
let isPageVisible = true;

// ======================== OCEAN ========================
let W, H, time = 0;
let fish = [], bgBubbles = [], lightRays = [];
let fishScared = false;

const SPECIES = [
  { name:'fish',    speed: .9, size: [60,130] },
  { name:'angelfish',speed: .75, size: [52,110] },
  { name:'puffer',  speed: .6, size: [48,100] },
  { name:'shark',   speed: 1.1, size: [110,200] },
  { name:'turtle',  speed: .4, size: [80,150] },
  { name:'crab',    speed: .5, size: [36,70] },
  { name:'jelly',   speed: .45, size: [56,116] },
];

const PALETTE = {
  fish: [['#FBBF24','#D97706','#3B82F6'],['#EF4444','#B91C1C','#FCA5A5'],['#34D399','#059669','#6EE7B7'],['#FB923C','#EA580C','#FED7AA'],['#A78BFA','#7C3AED','#DDD6FE'],['#F472B6','#DB2777','#FBCFE8'],['#38BDF8','#0284C7','#BAE6FD'],['#FACC15','#CA8A04','#FEF08A']],
  shark: [['#64748B','#475569','#94A3B8'],['#8B9DC3','#5C6E91','#A0B4D6']],
  turtle: [['#22C55E','#16A34A','#86EFAC'],['#4ADE80','#22C55E','#BBF7D0']],
  crab: [['#EF4444','#DC2626','#FCA5A5'],['#F87171','#EF4444','#FECACA']],
  jelly: [['#E879F9','#D946EF','#F5D0FE'],['#C084FC','#A855F7','#E9D5FF']],
};

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initFish(20); initBubbles(30); initLightRays(5);
}
window.addEventListener('resize', resize);

function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

function createFish(species) {
  if (species === undefined) species = Math.floor(Math.random() * 7);
  const s = SPECIES[species];
  const palKey = ['fish','fish','fish','shark','turtle','crab','jelly'][species];
  const pal = PALETTE[palKey][Math.floor(Math.random() * PALETTE[palKey].length)];
  const sz = s.size[0] + Math.random() * (s.size[1] - s.size[0]);
  return {
    x: Math.random() * W,
    y: species === 5 ? H * .82 + Math.random() * H * .08 : Math.random() * H * .8 + H * .08,
    vx: s.speed * (.7 + Math.random() * .6) * (Math.random() > .5 ? 1 : -1),
    vy: species === 5 ? 0 : (Math.random() - .5) * .2,
    size: sz, species,
    body: pal[0], fin: pal[1], accent: pal[2],
    tw: Math.random() * 6, twSpd: .03 + Math.random() * .04,
    wb: Math.random() * 6, wbSpd: .008 + Math.random() * .015,
    baseVx: 0, state: 'calm',
    phase: Math.random() * 6,
    legPhase: 0,
  };
}
function initFish(n) {
  fish = [];
  // Guarantee at least one of each species
  for (let i = 0; i < 7; i++) { const f = createFish(i); f.baseVx = f.vx; fish.push(f); }
  for (let i = 7; i < n; i++) { const f = createFish(); f.baseVx = f.vx; fish.push(f); }
  shuffle(fish);
}
function initBubbles(n) { bgBubbles = []; for (let i = 0; i < n; i++) bgBubbles.push({ x: Math.random() * W, y: Math.random() * H, r: 5 + Math.random() * 12, spd: .3 + Math.random() * .7, dr: (Math.random() - .5) * .4, wx: Math.random() * 120 }); }
function initLightRays(n) { lightRays = []; for (let i = 0; i < n; i++) lightRays.push({ x: Math.random() * W, w: 20 + Math.random() * 60, spd: .05 + Math.random() * .1, a: .03 + Math.random() * .04, ph: Math.random() * 6 }); }

function drawFish(f) {
  ctx.save(); ctx.translate(f.x, f.y);
  if (f.vx < 0) ctx.scale(-1, 1);
  const s = f.size, wag = Math.sin(f.tw) * .3, bob = Math.sin(f.wb) * 1.5;
  ctx.translate(0, bob);

  if (f.species === 0) {
    // ------------------- PEZ COMUN (realista) -------------------
    // Cuerpo fusiforme con curvas bezier
    ctx.beginPath(); ctx.moveTo(s * .55, 0);
    ctx.bezierCurveTo(s * .5, -s * .22, s * .1, -s * .28, -s * .3, -s * .18);
    ctx.quadraticCurveTo(-s * .55, -s * .06, -s * .65, 0);
    ctx.quadraticCurveTo(-s * .55, s * .06, -s * .3, s * .18);
    ctx.bezierCurveTo(s * .1, s * .28, s * .5, s * .22, s * .55, 0);
    const bg = ctx.createLinearGradient(0, -s * .2, 0, s * .2);
    bg.addColorStop(0, f.body); bg.addColorStop(.5, f.body); bg.addColorStop(1, f.fin);
    ctx.fillStyle = bg; ctx.fill(); ctx.strokeStyle = f.fin; ctx.lineWidth = 1.5; ctx.stroke();
    // Cola ahorquillada
    ctx.beginPath(); ctx.moveTo(-s * .65, 0);
    ctx.quadraticCurveTo(-s * .85, -s * .3 + wag * s * .3, -s * .9, -s * .25 + wag * s * .2);
    ctx.lineTo(-s * .7, 0);
    ctx.lineTo(-s * .9, s * .25 + wag * s * .2);
    ctx.quadraticCurveTo(-s * .85, s * .3 + wag * s * .3, -s * .65, 0);
    ctx.fillStyle = f.fin; ctx.fill();
    // Aleta dorsal
    ctx.beginPath(); ctx.moveTo(-s * .05, -s * .25); ctx.quadraticCurveTo(s * .1, -s * .42, s * .25, -s * .25); ctx.fillStyle = f.fin; ctx.fill();
    // Aleta anal
    ctx.beginPath(); ctx.moveTo(-s * .2, s * .2); ctx.quadraticCurveTo(-s * .05, s * .38, s * .1, s * .22); ctx.fillStyle = f.fin; ctx.fill();
    // Aleta pectoral
    ctx.beginPath(); ctx.moveTo(s * .15, s * .12); ctx.quadraticCurveTo(s * .1, s * .28, s * .28, s * .2); ctx.closePath(); ctx.fillStyle = f.accent; ctx.globalAlpha = .6; ctx.fill(); ctx.globalAlpha = 1;
    // Linea de la agalla
    ctx.beginPath(); ctx.arc(s * .22, -s * .02, s * .12, -1.2, 1.2); ctx.strokeStyle = f.fin; ctx.lineWidth = 1.5; ctx.stroke();
    // Escamas (patron de circulos pequeños)
    ctx.strokeStyle = f.accent; ctx.lineWidth = .8; ctx.globalAlpha = .25;
    for (let i = -3; i < 5; i++) { for (let j = -1; j < 2; j++) { const ex = i * s * .1 + s * .02, ey = j * s * .08; ctx.beginPath(); ctx.arc(ex, ey, s * .04, 0, Math.PI); ctx.stroke(); } }
    ctx.globalAlpha = 1;
    // Ojo
    ctx.beginPath(); ctx.arc(s * .35, -s * .06, s * .07, 0, Math.PI * 2); ctx.fillStyle = 'white'; ctx.fill(); ctx.strokeStyle = '#334155'; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(s * .36, -s * .06, s * .045, 0, Math.PI * 2); ctx.fillStyle = '#1a1a2e'; ctx.fill();
    ctx.beginPath(); ctx.arc(s * .38, -s * .08, s * .018, 0, Math.PI * 2); ctx.fillStyle = 'white'; ctx.fill();
    // Boca
    ctx.beginPath(); ctx.arc(s * .54, s * .02, s * .03, 0, Math.PI); ctx.strokeStyle = f.fin; ctx.lineWidth = 1.2; ctx.stroke();

  } else if (f.species === 1) {
    // ------------------- PEZ ANGEL (realista) -------------------
    // Cuerpo discoidal alto
    ctx.beginPath(); ctx.moveTo(0, -s * .4);
    ctx.quadraticCurveTo(s * .32, -s * .2, s * .35, 0);
    ctx.quadraticCurveTo(s * .32, s * .25, 0, s * .4);
    ctx.quadraticCurveTo(-s * .3, s * .25, -s * .35, 0);
    ctx.quadraticCurveTo(-s * .3, -s * .2, 0, -s * .4);
    const bg = ctx.createLinearGradient(0, -s * .3, 0, s * .3);
    bg.addColorStop(0, f.body); bg.addColorStop(1, f.fin);
    ctx.fillStyle = bg; ctx.fill(); ctx.strokeStyle = f.fin; ctx.lineWidth = 1.5; ctx.stroke();
    // Aleta dorsal grande y triangular
    const dfH = s * .28 + Math.sin(time * .03 + f.phase) * s * .04;
    ctx.beginPath(); ctx.moveTo(-s * .08, -s * .38); ctx.quadraticCurveTo(s * .1, -s * .38 - dfH, s * .32, -s * .28); ctx.fillStyle = f.fin; ctx.fill();
    // Aleta anal grande
    const afH = s * .26 + Math.sin(time * .03 + f.phase + 1) * s * .04;
    ctx.beginPath(); ctx.moveTo(-s * .08, s * .38); ctx.quadraticCurveTo(s * .1, s * .38 + afH, s * .32, s * .28); ctx.fillStyle = f.fin; ctx.fill();
    // Aleta caudal (cola)
    ctx.beginPath(); ctx.moveTo(-s * .35, 0); ctx.quadraticCurveTo(-s * .55, -s * .3 + wag * s * .2, -s * .6, -s * .28 + wag * s * .2);
    ctx.lineTo(-s * .42, 0); ctx.lineTo(-s * .6, s * .28 + wag * s * .2);
    ctx.quadraticCurveTo(-s * .55, s * .3 + wag * s * .2, -s * .35, 0);
    ctx.fillStyle = f.fin; ctx.fill();
    // Aletas pelvicas (hilos)
    ctx.strokeStyle = f.accent; ctx.lineWidth = 1.5; ctx.globalAlpha = .5;
    ctx.beginPath(); ctx.moveTo(-s * .05, s * .3); ctx.quadraticCurveTo(s * .02, s * .48, s * .06, s * .55); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s * .05, s * .3); ctx.quadraticCurveTo(s * .1, s * .46, s * .12, s * .5); ctx.stroke();
    ctx.globalAlpha = 1;
    // Rayas verticales
    ctx.strokeStyle = f.accent; ctx.lineWidth = 3; ctx.globalAlpha = .25;
    for (let i = -1; i < 3; i++) { const rx = i * s * .1; ctx.beginPath(); ctx.moveTo(rx, -s * .25); ctx.lineTo(rx, s * .25); ctx.stroke(); }
    ctx.globalAlpha = 1;
    // Ojo
    ctx.beginPath(); ctx.arc(s * .2, -s * .06, s * .07, 0, Math.PI * 2); ctx.fillStyle = 'white'; ctx.fill(); ctx.strokeStyle = '#334155'; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(s * .21, -s * .06, s * .04, 0, Math.PI * 2); ctx.fillStyle = '#1a1a2e'; ctx.fill();
    ctx.beginPath(); ctx.arc(s * .23, -s * .08, s * .015, 0, Math.PI * 2); ctx.fillStyle = 'white'; ctx.fill();
    // Boca pequeña
    ctx.beginPath(); ctx.arc(s * .34, s * .02, s * .02, 0, Math.PI); ctx.strokeStyle = f.fin; ctx.lineWidth = 1; ctx.stroke();

  } else if (f.species === 2) {
    // ------------------- PEZ GLOBO (realista) -------------------
    // Cuerpo redondo
    ctx.beginPath(); ctx.arc(0, 0, s * .32, 0, Math.PI * 2);
    const bg = ctx.createRadialGradient(0, -s * .06, s * .05, 0, 0, s * .32);

  } else if (f.species === 3) {

    ctx.quadraticCurveTo(-s * .4, s * .14, -s * .1, s * .18);
    ctx.bezierCurveTo(s * .2, s * .2, s * .55, s * .16, s * .65, 0);

    ctx.fillStyle = bg; ctx.fill(); ctx.strokeStyle = '#475569'; ctx.lineWidth = 2; ctx.stroke();
    // Hocico
    ctx.beginPath(); ctx.moveTo(s * .65, -s * .03); ctx.quadraticCurveTo(s * .82, -s * .01, s * .65, s * .03); ctx.closePath(); ctx.fillStyle = '#A0B4C8'; ctx.fill();
    // Aleta dorsal grande
    ctx.beginPath(); ctx.moveTo(s * .02, -s * .18); ctx.quadraticCurveTo(s * .1, -s * .48, s * .28, -s * .22); ctx.closePath();
    ctx.fillStyle = '#64748B'; ctx.fill(); ctx.strokeStyle = '#475569'; ctx.lineWidth = 1.5; ctx.stroke();
    // Segunda aleta dorsal (pequeña)
    ctx.beginPath(); ctx.moveTo(-s * .25, -s * .15); ctx.lineTo(-s * .2, -s * .28); ctx.lineTo(-s * .15, -s * .14); ctx.closePath(); ctx.fillStyle = '#64748B'; ctx.fill();
    // Aleta pectoral
    ctx.beginPath(); ctx.moveTo(s * .15, s * .12); ctx.quadraticCurveTo(s * .1, s * .38, s * .35, s * .28); ctx.closePath(); ctx.fillStyle = '#64748B'; ctx.fill();
    // Aleta anal
    ctx.beginPath(); ctx.moveTo(-s * .2, s * .15); ctx.lineTo(-s * .15, s * .26); ctx.lineTo(-s * .1, s * .14); ctx.closePath(); ctx.fillStyle = '#64748B'; ctx.fill();

    ctx.lineTo(-s * .85, s * .02);
    ctx.lineTo(-s * .9, s * .12 + wag * s * .1);
    ctx.lineTo(-s * .7, 0);
    ctx.fillStyle = '#64748B'; ctx.fill(); ctx.strokeStyle = '#475569'; ctx.lineWidth = 1.5; ctx.stroke();
    // 5 ranuras branquiales
    ctx.strokeStyle = '#475569'; ctx.lineWidth = 1.5; ctx.globalAlpha = .5;
    for (let i = 0; i < 5; i++) { const gx = s * .28 - i * s * .05; ctx.beginPath(); ctx.arc(gx, s * .02, s * .03 + i * .005, -.6, .6); ctx.stroke(); }

    // Dientes triangulares
    ctx.fillStyle = 'white'; ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = .5;
    for (let i = 0; i < 7; i++) { const tx = s * .58 + i * s * .03; ctx.beginPath(); ctx.moveTo(tx, s * .02); ctx.lineTo(tx + s * .015, s * .07); ctx.lineTo(tx + s * .025, s * .02); ctx.closePath(); ctx.fill(); ctx.stroke(); }

  } else if (f.species === 4) {
    // ------------------- TORTUGA MARINA (realista) -------------------
    // Caparazon ovalado con domo
    ctx.beginPath(); ctx.ellipse(0, -s * .03, s * .38, s * .3, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#2D6A2D'; ctx.fill(); ctx.strokeStyle = '#1A4A1A'; ctx.lineWidth = 3; ctx.stroke();
    // Borde del caparazon (ribete)
    ctx.beginPath(); ctx.ellipse(0, -s * .03, s * .36, s * .28, 0, 0, Math.PI * 2);
    ctx.strokeStyle = '#4ADE80'; ctx.lineWidth = 1.5; ctx.stroke();
    // Patron de escudos (5 hexagonos centrales + anillo)
    ctx.fillStyle = '#3A8A3A'; ctx.strokeStyle = '#1A5A1A'; ctx.lineWidth = 1.2;
    // Escudo central
    const drawScute = (cx, cy, w, h) => { ctx.beginPath(); for (let k = 0; k < 6; k++) { const a = (k / 6) * Math.PI * 2 - Math.PI/6; ctx.lineTo(cx + Math.cos(a) * w, cy + Math.sin(a) * h); } ctx.closePath(); ctx.fill(); ctx.stroke(); };
    drawScute(0, -s * .02, s * .1, s * .08);
    drawScute(-s * .15, -s * .02, s * .08, s * .06);
    drawScute(s * .15, -s * .02, s * .08, s * .06);

    drawScute(s * .08, -s * .16, s * .07, s * .05);
    drawScute(-s * .08, s * .12, s * .07, s * .05);
    drawScute(s * .08, s * .12, s * .07, s * .05);
    // Cabeza
    ctx.beginPath(); ctx.ellipse(s * .42, -s * .04, s * .13, s * .09, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#4ADE80'; ctx.fill(); ctx.strokeStyle = '#16A34A'; ctx.lineWidth = 1.5; ctx.stroke();
    // Ojo
    ctx.beginPath(); ctx.arc(s * .48, -s * .07, s * .035, 0, Math.PI * 2); ctx.fillStyle = 'white'; ctx.fill(); ctx.strokeStyle = '#334155'; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(s * .48, -s * .07, s * .02, 0, Math.PI * 2); ctx.fillStyle = '#1a1a2e'; ctx.fill();
    // Pico (boca de tortuga)
    ctx.beginPath(); ctx.moveTo(s * .54, -s * .02); ctx.lineTo(s * .56, s * .01); ctx.lineTo(s * .52, s * .02); ctx.closePath(); ctx.fillStyle = '#D4A574'; ctx.fill();
    // Aleta delantera (grande, como remo)
    ctx.fillStyle = '#4ADE80'; ctx.strokeStyle = '#16A34A'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(s * .2, s * .15); ctx.quadraticCurveTo(s * .45, s * .38 + wag * s * .15, s * .55, s * .22 + wag * s * .1);
    ctx.quadraticCurveTo(s * .4, s * .15, s * .2, s * .12); ctx.closePath(); ctx.fill(); ctx.stroke();
    // Aleta trasera
    ctx.beginPath(); ctx.moveTo(-s * .28, s * .12); ctx.quadraticCurveTo(-s * .48, s * .28 + wag * s * .1, -s * .52, s * .16 + wag * s * .08);
    ctx.quadraticCurveTo(-s * .4, s * .08, -s * .25, s * .1); ctx.closePath(); ctx.fill(); ctx.stroke();

    ctx.globalAlpha = .6;
    ctx.beginPath(); ctx.moveTo(-s * .2, s * .15); ctx.quadraticCurveTo(-s * .1, s * .35, -s * .0, s * .25); ctx.quadraticCurveTo(-s * .05, s * .18, -s * .15, s * .12); ctx.closePath(); ctx.fillStyle = '#22C55E'; ctx.fill();
    ctx.globalAlpha = 1;
    // Patron de puntos en la piel
    ctx.fillStyle = '#22C55E'; ctx.globalAlpha = .3;
    for (let i = 0; i < 6; i++) { const pa = (i / 6) * Math.PI * 2; ctx.beginPath(); ctx.arc(Math.cos(pa) * s * .45, Math.sin(pa) * s * .32 + s * .04, s * .015, 0, Math.PI * 2); ctx.fill(); }

  } else if (f.species === 5) {
    // ------------------- CANGREJO (realista) -------------------
    const walk = Math.sin(time * .08 + f.phase) * s * .05;
    // Caparazon hexagonal
    ctx.beginPath();
    for (let k = 0; k < 6; k++) { const a = (k / 6) * Math.PI * 2 - Math.PI/2; const r = k % 2 === 0 ? s * .28 : s * .22; ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r); }
    ctx.closePath(); ctx.fillStyle = '#DC2626'; ctx.fill(); ctx.strokeStyle = '#991B1B'; ctx.lineWidth = 2; ctx.stroke();
    // Detalle caparazon
    ctx.beginPath(); ctx.ellipse(0, s * .02, s * .12, s * .08, 0, 0, Math.PI * 2); ctx.strokeStyle = '#991B1B'; ctx.lineWidth = 1; ctx.globalAlpha = .4; ctx.stroke(); ctx.globalAlpha = 1;

    ctx.strokeStyle = '#B91C1C'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (let side = -1; side <= 1; side += 2) {
      for (let i = 0; i < 4; i++) {
        const yy = -s * .08 + i * s * .06;
        const seg1x = side * (s * .28 + i * s * .02), seg1y = yy;
        const seg2x = side * (s * .42 + i * s * .03) + walk * (i % 2 === 0 ? 1 : -1), seg2y = yy + s * .12 + i * s * .02;
        const seg3x = side * (s * .52 + i * s * .03) + walk * (i % 2 === 0 ? .5 : -.5), seg3y = yy + s * .2 + i * s * .02;
        ctx.beginPath(); ctx.moveTo(side * s * .22, yy);

    }

    ctx.fillStyle = '#DC2626'; ctx.strokeStyle = '#991B1B'; ctx.lineWidth = 2;
    for (let side = -1; side <= 1; side += 2) {

      ctx.quadraticCurveTo(side * s * .38, -s * .12, side * s * .2, -s * .04); ctx.closePath(); ctx.fill(); ctx.stroke();

    }

      ctx.beginPath(); ctx.arc(side * s * .07, -s * .26, s * .05, 0, Math.PI * 2); ctx.fillStyle = '#FCA5A5'; ctx.fill(); ctx.strokeStyle = '#991B1B'; ctx.lineWidth = 1; ctx.stroke();
      ctx.beginPath(); ctx.arc(side * s * .07, -s * .26, s * .025, 0, Math.PI * 2); ctx.fillStyle = '#1a1a2e'; ctx.fill();
    }
    // Antenas
    ctx.strokeStyle = '#B91C1C'; ctx.lineWidth = 1; ctx.globalAlpha = .4;
    for (let side = -1; side <= 1; side += 2) {
      ctx.beginPath(); ctx.moveTo(side * s * .04, -s * .14);
      ctx.quadraticCurveTo(side * s * .02, -s * .3, side * s * .01, -s * .38); ctx.stroke();
    }
    ctx.globalAlpha = 1;

  } else if (f.species === 6) {
    // ------------------- MEDUSA (realista) -------------------
    const pulse = 1 + Math.sin(time * .04 + f.phase) * .08;
    // Campana con borde lobulado
    ctx.beginPath(); ctx.arc(0, -s * .02, s * .28 * pulse, 0, Math.PI * 2);

    ctx.strokeStyle = f.fin; ctx.lineWidth = 2; ctx.stroke();

    ctx.strokeStyle = f.fin; ctx.lineWidth = 1; ctx.globalAlpha = .2;

    ctx.strokeStyle = f.fin; ctx.lineWidth = 1.5; ctx.globalAlpha = .3;
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2 + Math.PI / 4;

      for (let t = 0; t < s * .35; t += 4) { ox += Math.sin((t + time * .015) * .15 + i * 2) * 3; oy += 3; ctx.lineTo(ox, oy); }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // Tentaculos largos y finos
    ctx.strokeStyle = f.fin; ctx.lineWidth = 1.2; ctx.globalAlpha = .25;
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const x0 = Math.cos(angle) * s * .26 * pulse, y0 = Math.sin(angle) * s * .25 * pulse;
      ctx.beginPath(); ctx.moveTo(x0, y0);
      let x = x0, y = y0;
      const len = s * (.5 + ((i * 137 + f.phase * 10) % 100) / 250);
      for (let t = 0; t < len; t += 4) { x += Math.sin((t + time * .025) * .12 + i * 1.5) * (1.5 + Math.sin(i) * .5); y += 3.5; ctx.lineTo(x, y); }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // Puntos bioluminiscentes
    ctx.fillStyle = 'white'; ctx.globalAlpha = .2;
    for (let i = 0; i < 8; i++) { const a = (i / 8) * Math.PI * 2 + Math.sin(time * .02 + i) * .2; ctx.beginPath(); ctx.arc(Math.cos(a) * s * .16 * pulse, Math.sin(a) * s * .14 * pulse, s * .018, 0, Math.PI * 2); ctx.fill(); }
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function drawScene() {
  time++;
  const vf = currentVolume / 100;
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0c1e3a'); grad.addColorStop(.3, '#0f2847'); grad.addColorStop(.6, '#143057'); grad.addColorStop(1, '#0a1929');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  lightRays.forEach(r => {
    const a = r.a + Math.sin(time * r.spd + r.ph) * .02;
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, `rgba(34,211,238,${a})`); g.addColorStop(1, 'rgba(34,211,238,0)');
    ctx.fillStyle = g; const xo = Math.sin(time * .02 + r.ph) * 30;
    ctx.beginPath(); ctx.moveTo(r.x + xo, 0); ctx.lineTo(r.x + xo + r.w * .3, H); ctx.lineTo(r.x + xo - r.w * .3, H); ctx.closePath(); ctx.fill();
  });
  const fy = H * .92;
  ctx.fillStyle = '#1a2a1a';
  ctx.beginPath(); ctx.moveTo(0, fy); for (let x = 0; x <= W; x += 20) ctx.lineTo(x, fy + Math.sin(x * .03 + time * .005) * 5); ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#2a3a2a';
  ctx.beginPath(); ctx.moveTo(0, fy); for (let x = 0; x <= W; x += 10) ctx.lineTo(x, fy + Math.sin(x * .03 + time * .005) * 5 - 3); ctx.lineTo(W, fy); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#2d6a2d'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  for (let i = 0; i < 10; i++) {
    const sx = 40 + i * (W / 10); ctx.beginPath(); ctx.moveTo(sx, fy); const h = 35 + Math.sin(i * 2.3) * 18; let py = fy;
    for (let t = 0; t < h; t += 5) { ctx.lineTo(sx + Math.sin(t * .1 + time * .02 + i) * 7, py - 5); py -= 5; } ctx.stroke();
  }
    bgBubbles.forEach(b => {
    b.y -= b.spd * (1 + vf * .5); b.x += Math.sin(b.wx + time * .01) * b.dr;
    if (b.y < -20) { b.y = H + 20; b.x = Math.random() * W; }
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,255,255,${.06 + b.r * .012})`; ctx.fill();
    ctx.strokeStyle = `rgba(255,255,255,${.04 + b.r * .008})`; ctx.lineWidth = .5; ctx.stroke();
  });
  fish.forEach(f => {
    if (isAlert || fishScared) {
      f.state = 'panic'; const pm = 4; f.vx = (f.vx > 0 ? 1 : -1) * Math.abs(f.baseVx) * pm; f.vy = (f.vy || 0) * 2;
    } else if (vf > .7) {
      f.state = 'fast'; f.vx = (f.vx > 0 ? 1 : -1) * Math.abs(f.baseVx) * (1 + vf);
    } else { f.state = 'calm'; f.vx = f.baseVx * (.6 + (1 - vf) * .4); }
    f.x += f.vx; f.y += f.vy + Math.sin(time * f.wbSpd + f.wb) * .3; f.tw += f.twSpd * (1 + vf * 1.5); f.wb += f.wbSpd;
    if (f.vx > 0 && f.x > W + f.size) f.x = -f.size; else if (f.vx < 0 && f.x < -f.size) f.x = W + f.size;
    if (f.y < -f.size) f.y = H + f.size; else if (f.y > H + f.size) f.y = -f.size;
    drawFish(f);
  });
}

// ======================== UI ========================
function showScreen(s) {
  [screenStart, screenMonitor, screenAlert].forEach(el => { el.classList.remove('show', 'hide'); el.classList.add('hide'); });
  s.classList.remove('hide'); s.classList.add('show');
}

function setDolphinMood(mood) {
  // mood: 'happy' | 'worried' | 'sad'
  if (mood === 'happy') {
    dolphinMouth.setAttribute('d', 'M 143 92 Q 152 103 165 90');
    dolphinBlush.setAttribute('opacity', '0.4');
  } else if (mood === 'worried') {
    dolphinMouth.setAttribute('d', 'M 145 95 Q 152 100 163 93');
    dolphinBlush.setAttribute('opacity', '0.15');
  } else {
    dolphinMouth.setAttribute('d', 'M 148 100 Q 152 95 163 103');
    dolphinBlush.setAttribute('opacity', '0');
  }
}

// ======================== DRAGGABLE THRESHOLD ========================
function setThreshold(pct) {
  threshold = Math.max(10, Math.min(95, Math.round(pct)));
  thresholdLine.style.bottom = threshold + '%';
}

function startDrag(e) {
  e.preventDefault();
  const rect = barContainer.getBoundingClientRect();
  const onMove = (ev) => {
    const y = ev.touches ? ev.touches[0].clientY : ev.clientY;
    const pct = (1 - (y - rect.top) / rect.height) * 100;
    setThreshold(pct);
  };
  const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onUp); };
  document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, { passive: false }); document.addEventListener('touchend', onUp);
  // click inicial también mueve
  onMove(e);
}

['mousedown', 'touchstart'].forEach(ev => thresholdLine.addEventListener(ev, startDrag));
// También se puede hacer clic en cualquier parte de la barra para mover el tope
barContainer.addEventListener('click', (e) => {
  if (e.target.closest('#threshold-line')) return;
  const rect = barContainer.getBoundingClientRect();
  const y = e.clientY;
  const pct = (1 - (y - rect.top) / rect.height) * 100;
  setThreshold(pct);
});

thresholdLine.style.bottom = threshold + '%';

// ======================== DEVICES ========================
async function enumerateDevices() {
  try { await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(_) {}
  const all = await navigator.mediaDevices.enumerateDevices();
  devices = all.filter(d => d.kind === 'audioinput');
  deviceSelect.innerHTML = '';
  if (!devices.length) { deviceSelect.innerHTML = '<option value="">Sin dispositivos</option>'; return; }
  devices.forEach((d,i) => {
    const opt = document.createElement('option'); opt.value = d.deviceId;
    let l = d.label || `Entrada ${i+1}`;
    if (/mic|microphone|microfono/i.test(l)) l = '🎤 ' + l;
    else if (/line|entrada|línea|line.in/i.test(l)) l = '🔌 ' + l;
    else l = '🎧 ' + l;
    opt.textContent = l;
    if (d.deviceId === selectedDeviceId) opt.selected = true;
    deviceSelect.appendChild(opt);
  });
  if (!selectedDeviceId && devices.length > 0) { selectedDeviceId = devices[0].deviceId; deviceSelect.value = selectedDeviceId; }
}
deviceSelect.addEventListener('change', () => { selectedDeviceId = deviceSelect.value || null; });
navigator.mediaDevices.addEventListener('devicechange', enumerateDevices);

// ======================== AUDIO ========================
btnStart.addEventListener('click', async () => {
  try {
    const constraints = { audio: selectedDeviceId ? { deviceId: { exact: selectedDeviceId } } : true };
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    micError.classList.add('hidden');
    isMonitoring = true;
    startMonitor(stream);
    showScreen(screenMonitor);
  } catch (err) {
    micError.textContent = 'No pudimos acceder al dispositivo. Revisá los permisos.';
    micError.classList.remove('hidden');
  }
});

function startMonitor(stream) {
  mediaStream = stream;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const bufLen = analyser.frequencyBinCount;
  const freqData = new Uint8Array(bufLen);
  const src = audioCtx.createMediaStreamSource(stream);
  src.connect(analyser);
  const track = stream.getAudioTracks()[0];
  labelDevice.textContent = track.label || '';

  (function tick() {
    analyser.getByteFrequencyData(freqData);
    let sum = 0; for (let i = 0; i < bufLen; i++) sum += freqData[i];
    currentVolume = Math.min(100, Math.round(sum / bufLen));
    if (!isAlert) {
      volFill.style.height = currentVolume + '%';
      volPct.textContent = currentVolume + '%';
      if (currentVolume >= threshold) {
        triggerAlert();
        setDolphinMood('sad');
      } else if (currentVolume > threshold * .75) {
        setDolphinMood('worried');
      } else {
        setDolphinMood('happy');
      }
    }
    animFrame = requestAnimationFrame(tick);
  })();
}

// ======================== ALERT ========================
function triggerAlert() {
  if (isAlert) return;
  isAlert = true; fishScared = true;
  showScreen(screenAlert);
  countdown = 5; renderCountdown();
  $('alert-vol-text').textContent = `Volumen: ${currentVolume}% — Silencio para alegrar al delfín`;

  alertTimer = setInterval(() => {
    if (currentVolume >= threshold * .8) { countdown = 5; renderCountdown(); return; }
    countdown--;
    if (countdown <= 0) { clearInterval(alertTimer); alertTimer = null; resetMonitor(); }
    else renderCountdown();
  }, 1000);
}

function renderCountdown() {
  cdNumber.textContent = countdown;
  cdBar.style.width = (countdown / 5 * 100) + '%';
  cdBubbles.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const b = document.createElement('div');
    b.className = `w-7 h-7 md:w-8 md:h-8 rounded-full border-2 transition-all duration-300 ${i < countdown ? 'bg-cyan-400/40 border-cyan-300 animate-pulse' : 'bg-transparent border-blue-800/40'}`;
    cdBubbles.appendChild(b);
  }
}

function resetMonitor() {
  showScreen(screenMonitor);
  volFill.style.height = '0%'; volPct.textContent = '0%';
  setTimeout(() => { fishScared = false; }, 600);
  function waitForQuiet() { if (currentVolume < threshold * .5) isAlert = false; else requestAnimationFrame(waitForQuiet); }
  requestAnimationFrame(waitForQuiet);
}

// ======================== BUTTONS ========================
btnDevices.addEventListener('click', () => { cleanup(); showScreen(screenStart); enumerateDevices(); });
btnReset.addEventListener('click', () => { cleanup(); btnStart.click(); });

function cleanup() {
  if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  cancelAnimationFrame(animFrame);
  isMonitoring = false; isAlert = false;
  if (alertTimer) { clearInterval(alertTimer); alertTimer = null; }
  fishScared = false;
  cancelAnimationFrame(oceanFrame);
  oceanFrame = requestAnimationFrame(animLoop);
}

// ======================== ANIM LOOP ========================
let oceanFrame;
function animLoop() { drawScene(); oceanFrame = requestAnimationFrame(animLoop); }

// ======================== INIT ========================
resize(); animLoop(); enumerateDevices();
</script>
</body>
