<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canal 13 Argentina · En Vivo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');

  :root{--bg:#050508;--surface:#0a0a12;--panel:#111119;--border:#1a1a2a;--accent:#c8a84e;--accent2:#e74c3c;--text:#ececf0;--muted:#4e4e6a}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}

  .app{display:flex;flex-direction:column;height:100vh}

  header{display:flex;align-items:center;gap:14px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:10}
  header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,var(--accent) 50%,transparent 95%);opacity:.35}

  .ch-logo{height:32px;width:auto;object-fit:contain;filter:drop-shadow(0 0 8px rgba(200,168,78,.2))}
  .ch-logo-fallback{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--bg);flex-shrink:0}

  .ch-info{display:flex;flex-direction:column;gap:1px}
  .ch-name{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text)}
  .ch-sub{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

  .live-tag{margin-left:auto;display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);padding:4px 12px;border-radius:20px}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:livePulse 1.4s infinite;flex-shrink:0}
  @keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.6)}50%{box-shadow:0 0 0 5px rgba(231,76,60,0)}}

  .video-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;overflow:hidden;min-height:0}
  .video-wrap iframe{width:100%;height:100%;border:none;background:#000}
  .video-wrap iframe.hidden{display:none}

  .watermark{position:absolute;bottom:12px;right:16px;opacity:.06;pointer-events:none;z-index:2;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:#fff}

  .status-bar{background:var(--surface);border-top:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
  .status-bar a{color:var(--muted);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;text-decoration:none;transition:color .2s}
  .status-bar a:hover{color:var(--accent)}

  .src-group{display:flex;gap:4px;margin-left:8px}
  .src-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;padding:4px 10px;border-radius:4px;cursor:pointer;transition:all .15s}
  .src-btn:hover{border-color:var(--accent);color:var(--accent)}
  .src-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}

  .fs-btn{background:transparent;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
  .fs-btn:hover{border-color:var(--accent);color:var(--accent)}
  .fs-btn svg{width:14px;height:14px}

  @media(max-width:600px){
    header{padding:8px 12px;gap:10px}
    .ch-logo,.ch-logo-fallback{height:26px;width:26px}
    .ch-name{font-size:11px}
    .ch-sub{display:none}
    .live-tag{padding:3px 8px;font-size:8px}
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <img class="ch-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Canal_13_Argentina_2023.svg/200px-Canal_13_Argentina_2023.svg.png" alt="Canal 13" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" crossorigin="anonymous">
    <div class="ch-logo-fallback" style="display:none">13</div>
    <div class="ch-info">
      <div class="ch-name">Canal 13</div>
      <div class="ch-sub">El Trece · Buenos Aires · Argentina</div>
    </div>
    <div class="live-tag"><span class="live-dot"></span>En Vivo</div>
  </header>

  <div class="video-wrap" id="videoWrap">
    <iframe id="playerOficial" src="https://api.vodgc.net/player/v2/embed/playerId/PRZ9KU1515679151/contentId/1427089" allow="autoplay; fullscreen; encrypted-media" allowfullscreen loading="eager" importance="high" title="Canal 13 - Oficial"></iframe>
    <iframe id="playerLHDTV" class="hidden" src="https://www.livehdtv.com/embed/el-trece/" allow="autoplay; fullscreen; encrypted-media" allowfullscreen loading="lazy" title="Canal 13 - LiveHDTV"></iframe>
    <div class="watermark">CANAL 13</div>
  </div>

  <div class="status-bar">
    <span style="font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)">Señal oficial · Artear</span>
    <div class="src-group">
      <button class="src-btn active" data-src="oficial" onclick="switchSrc('oficial')">Oficial</button>
      <button class="src-btn" data-src="l_hdtv" onclick="switchSrc('l_hdtv')">LiveHDTV</button>
    </div>
    <span style="flex:1"></span>
    <a href="https://www.eltrecetv.com.ar/vivo/" target="_blank" rel="noopener">eltrecetv.com.ar</a>
    <button class="fs-btn" id="fsBtn" onclick="toggleFS()" aria-label="Pantalla completa" title="Pantalla completa">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6V2h4M14 10v4h-4M2 10v4h4M14 6V2h-4"/></svg>
    </button>
  </div>

</div>

<script>
const PLAYERS = { oficial: 'playerOficial', l_hdtv: 'playerLHDTV' }

function switchSrc(id) {
  document.querySelectorAll('.video-wrap iframe').forEach(el => el.classList.add('hidden'))
  document.querySelectorAll('.src-btn').forEach(el => el.classList.remove('active'))
  const el = document.getElementById(PLAYERS[id])
  if (el) el.classList.remove('hidden')
  const btn = document.querySelector('.src-btn[data-src="' + id + '"]')
  if (btn) btn.classList.add('active')
}

function toggleFS() {
  const el = document.getElementById('videoWrap')
  if (!document.fullscreenElement) el.requestFullscreen()
  else document.exitFullscreen()
}

document.getElementById('videoWrap').addEventListener('dblclick', toggleFS)

document.addEventListener('fullscreenchange', () => {
  const fs = document.fullscreenElement
  const btn = document.getElementById('fsBtn')
  btn.innerHTML = fs
    ? '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>'
    : '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6V2h4M14 10v4h-4M2 10v4h4M14 6V2h-4"/></svg>'
  btn.title = fs ? 'Salir de pantalla completa' : 'Pantalla completa'
})
</script>
</body>
</html>
