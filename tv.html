<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canal 13 Argentina · En Vivo</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');

  :root{--bg:#050508;--surface:#0a0a12;--panel:#111119;--border:#1a1a2a;--accent:#c8a84e;--accent2:#e74c3c;--text:#ececf0;--muted:#4e4e6a}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}

  .app{display:flex;flex-direction:column;height:100vh}

  header{display:flex;align-items:center;gap:14px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:10}
  header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,var(--accent) 50%,transparent 95%);opacity:.35}

  .ch-logo{height:32px;width:auto;object-fit:contain;filter:drop-shadow(0 0 8px rgba(200,168,78,.2))}
  .ch-logo-fallback{width:32px;height:32px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--bg);flex-shrink:0}

  .ch-info{display:flex;flex-direction:column;gap:1px}
  .ch-name{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text)}
  .ch-sub{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

  .live-tag{margin-left:auto;display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);padding:4px 12px;border-radius:20px}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:livePulse 1.4s infinite;flex-shrink:0}
  @keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.6)}50%{box-shadow:0 0 0 5px rgba(231,76,60,0)}}

  .status-badge{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--muted);background:var(--panel);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .3s}
  .status-dot.loading{background:#f39c12;animation:blink 1s infinite}
  .status-dot.ok{background:#2ecc71;box-shadow:0 0 6px rgba(46,204,113,.5)}
  .status-dot.err{background:var(--accent2)}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

  .video-container{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;overflow:hidden;min-height:0}
  video{width:100%;height:100%;object-fit:contain;display:block;background:#000}

  .watermark{position:absolute;bottom:12px;right:16px;opacity:.06;pointer-events:none;z-index:2;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:#fff}

  .buf-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);z-index:5;pointer-events:none}
  .buf-overlay.show{display:flex}
  .spinner-ring{width:48px;height:48px;border:3px solid rgba(255,255,255,.08);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .buf-text{position:absolute;margin-top:64px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}

  .error-state{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:4;background:var(--bg)}
  .error-state.show{display:flex}
  .error-icon{width:64px;height:64px;border:2px solid var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:.7}
  .error-state h3{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--accent2);text-transform:uppercase}
  .error-state p{font-size:12px;color:var(--muted);text-align:center;max-width:320px;line-height:1.7}
  .retry-btn{margin-top:8px;background:transparent;border:1px solid var(--border);color:var(--text);padding:8px 20px;border-radius:6px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
  .retry-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(200,168,78,.06)}

  .toast{position:absolute;top:16px;left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(10,10,18,.92);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.5px;padding:8px 18px;border-radius:6px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:20;backdrop-filter:blur(12px)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{border-color:var(--accent2);color:var(--accent2)}
  .toast.ok{border-color:#2ecc71;color:#2ecc71}

  .controls-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}

  .play-btn{background:var(--accent);border:none;color:var(--bg);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
  .play-btn:hover{filter:brightness(1.15);transform:scale(1.08);box-shadow:0 0 16px rgba(200,168,78,.25)}
  .play-btn svg{width:14px;height:14px}

  .vol-group{display:flex;align-items:center;gap:6px}
  .vol-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;align-items:center;transition:color .15s}
  .vol-btn:hover{color:var(--text)}
  .vol-btn svg{width:16px;height:16px}
  .vol-slider{-webkit-appearance:none;width:80px;height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
  .vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--accent);border-radius:50%;cursor:pointer}

  .ctrl-spacer{flex:1}

  .fs-btn{background:transparent;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
  .fs-btn:hover{border-color:var(--accent);color:var(--accent)}
  .fs-btn svg{width:14px;height:14px}

  .time-display{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.5px}

  @media(max-width:600px){
    header{padding:8px 12px;gap:10px}
    .ch-logo,.ch-logo-fallback{height:26px;width:26px}
    .ch-name{font-size:11px}
    .ch-sub{display:none}
    .live-tag{padding:3px 8px;font-size:8px}
    .controls-bar{padding:8px 12px;gap:8px}
    .vol-slider{width:50px}
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <img class="ch-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Canal_13_Argentina_2023.svg/200px-Canal_13_Argentina_2023.svg.png" alt="Canal 13" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" crossorigin="anonymous">
    <div class="ch-logo-fallback" style="display:none">13</div>
    <div class="ch-info">
      <div class="ch-name">Canal 13</div>
      <div class="ch-sub">El Trece · Buenos Aires · Argentina</div>
    </div>
    <div class="live-tag"><span class="live-dot"></span>En Vivo</div>
    <div class="status-badge">
      <span class="status-dot loading" id="statusDot"></span>
      <span id="statusText">Conectando</span>
    </div>
  </header>

  <div class="video-container" id="videoContainer">
    <video id="video" playsinline></video>
    <div class="watermark">CANAL 13</div>

    <div class="buf-overlay" id="bufOverlay">
      <div class="spinner-ring"></div>
      <span class="buf-text">Cargando señal</span>
    </div>

    <div class="error-state" id="errorState">
      <div class="error-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </div>
      <h3>Señal no disponible</h3>
      <p>No se pudo conectar con el stream de Canal 13. Esto puede ser temporal.</p>
      <button class="retry-btn" onclick="initStream()">Reintentar conexión</button>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <div class="controls-bar">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">
      <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
    </button>
    <div class="vol-group">
      <button class="vol-btn" id="muteBtn" onclick="toggleMute()">
        <svg id="volOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
        <svg id="volOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      </button>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.02" value="1" oninput="setVol(this.value)">
    </div>
    <span class="time-display" id="timeDisp">--:--</span>
    <div class="ctrl-spacer"></div>
    <button class="fs-btn" onclick="goFullscreen()" title="Pantalla completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    </button>
  </div>

</div>

<script>
/* ==========================================================================
   STREAMS DE CANAL 13
   ==========================================================================
   Fuentes públicas verificadas.
   - Pluto TV: requiere API key, no incluida aquí
   - Telecentro: solo funciona desde redes Telecentro Argentina
   - Las URLs de GitHub / streams públicos se actualizan regularmente
   ========================================================================== */
const STREAM_URLS = [
  // Stream oficial de la App TV Abierta Digital Argentina (gobierno)
  // Fuente: app oficial "TV Abierta Digital Argentina" (Play Store)
  // Requiere estar en Argentina para funcionar
  "https://streaming.eltrece.com.ar/hls/eltrece.m3u8",
  // Telecentro (ISP argentino) — funciona SOLO desde redes Telecentro
  "https://stream-gtlc.telecentro.net.ar/hls/canal13HD/canal13HD.m3u8",
  // Variantes de calidad (SD / backup)
  "https://stream-gtlc.telecentro.net.ar/hls/canal13HD/canal13HD_1200k.m3u8",
  "https://stream-gtlc.telecentro.net.ar/hls/canal13HD/canal13HD_800k.m3u8",
  // Alternativa Telecentro sin HD
  "https://stream-gtlc.telecentro.net.ar/hls/canal13/canal13.m3u8",
];

/* ==========================================================================
   REFERENCIAS DOM
   ========================================================================== */
const videoEl    = document.getElementById('video');
const bufOverlay = document.getElementById('bufOverlay');
const errorState = document.getElementById('errorState');
const statusDot  = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const iconPlay   = document.getElementById('iconPlay');
const iconPause  = document.getElementById('iconPause');
const volOn      = document.getElementById('volOn');
const volOff     = document.getElementById('volOff');
const timeDisp   = document.getElementById('timeDisp');
const toastEl    = document.getElementById('toast');

let hls = null;
let toastT = null;
let currentUrlIdx = 0;
let isPlaying = false;
let isMuted = false;
let prevVol = 1;
let safetyTimer = null;

/* ==========================================================================
   UTILIDADES
   ========================================================================== */
function fmtTime(s) {
  if (!isFinite(s) || s < 0) return 'LIVE';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function toast(msg, type, dur) {
  type = type || '';
  dur = dur || 3000;
  toastEl.textContent = msg;
  toastEl.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastT);
  toastT = setTimeout(() => toastEl.classList.remove('show'), dur);
}

function setStatus(s, t) {
  statusDot.className = 'status-dot ' + s;
  statusText.textContent = t;
}

function setPlayIcon(playing) {
  isPlaying = playing;
  iconPlay.style.display  = playing ? 'none' : '';
  iconPause.style.display = playing ? '' : 'none';
}

/* ==========================================================================
   MOTOR DE STREAMING
   ========================================================================== */
function destroyHls() {
  if (hls) { hls.destroy(); hls = null; }
}

function showError() {
  bufOverlay.classList.remove('show');
  errorState.classList.add('show');
  videoEl.style.display = 'none';
  setPlayIcon(false);
  setStatus('err', 'Sin señal');
  clearTimeout(safetyTimer);
}

function tryNextUrl() {
  currentUrlIdx++;
  if (currentUrlIdx < STREAM_URLS.length) {
    console.log('Probando URL alternativa #' + (currentUrlIdx + 1) + '...');
    toast('Probando señal alternativa...', '', 2000);
    loadStream(STREAM_URLS[currentUrlIdx]);
  } else {
    console.error('Todas las URLs fallaron');
    showError();
  }
}

function loadStream(url) {
  destroyHls();
  errorState.classList.remove('show');
  bufOverlay.classList.add('show');
  videoEl.style.display = 'block';
  setStatus('loading', 'Conectando');

  const isHlsUrl = url.includes('.m3u8');

  if (isHlsUrl && Hls.isSupported()) {
    hls = new Hls({
      enableWorker: true,
      lowLatencyMode: false,
      maxBufferLength: 30,
      startFragPrefetch: true,
      manifestLoadingTimeOut: 20000,
      manifestLoadingMaxRetry: 3,
      manifestLoadingRetryDelay: 1500,
      levelLoadingTimeOut: 20000,
      levelLoadingMaxRetry: 3,
      levelLoadingRetryDelay: 1500,
      fragLoadingTimeOut: 20000,
      fragLoadingMaxRetry: 5,
      fragLoadingRetryDelay: 1000,
      xhrSetup: function(xhr) {
        xhr.withCredentials = false;
      }
    });

    hls.loadSource(url);
    hls.attachMedia(videoEl);

    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      console.log('Manifiesto parseado OK');
      videoEl.play().catch(function() {
        toast('Presioná play para comenzar', 'ok', 4000);
        setPlayIcon(false);
        bufOverlay.classList.remove('show');
        setStatus('ok', 'Listo');
      });
    });

    hls.on(Hls.Events.FRAG_LOADED, function() {
      bufOverlay.classList.remove('show');
      setStatus('ok', 'Señal OK');
      clearTimeout(safetyTimer);
    });

    hls.on(Hls.Events.LEVEL_SWITCHED, function(e, data) {
      var lvl = hls.levels[data.level];
      if (lvl) {
        console.log('Calidad:', lvl.height + 'p', lvl.bitrate ? Math.round(lvl.bitrate/1000) + 'kbps' : '');
      }
    });

    var mediaRetryCount = 0;
    hls.on(Hls.Events.ERROR, function(e, data) {
      console.warn('HLS Error:', data.type, data.details, data.fatal ? '(FATAL)' : '');
      if (data.fatal) {
        if (data.type === Hls.ErrorTypes.MEDIA_ERROR && mediaRetryCount < 3) {
          mediaRetryCount++;
          hls.recoverMediaError();
        } else {
          tryNextUrl();
        }
      }
    });

  } else if (isHlsUrl && videoEl.canPlayType('application/vnd.apple.mpegurl')) {
    videoEl.src = url;
    videoEl.addEventListener('loadedmetadata', function onMeta() {
      videoEl.removeEventListener('loadedmetadata', onMeta);
      videoEl.play().catch(function() {
        toast('Presioná play para comenzar', 'ok', 4000);
        setPlayIcon(false);
        bufOverlay.classList.remove('show');
        setStatus('ok', 'Listo');
      });
    });
    videoEl.addEventListener('error', function onErr() {
      videoEl.removeEventListener('error', onErr);
      tryNextUrl();
    });
  } else {
    videoEl.src = url;
    videoEl.addEventListener('loadeddata', function onLoaded() {
      videoEl.removeEventListener('loadeddata', onLoaded);
      videoEl.play().catch(function() {});
      bufOverlay.classList.remove('show');
      setStatus('ok', 'Señal OK');
      clearTimeout(safetyTimer);
    });
    videoEl.addEventListener('error', function onErr() {
      videoEl.removeEventListener('error', onErr);
      tryNextUrl();
    });
  }

  clearTimeout(safetyTimer);
  safetyTimer = setTimeout(function() {
    if (bufOverlay.classList.contains('show')) {
      console.log('Timeout — probando siguiente URL');
      tryNextUrl();
    }
  }, 18000);
}

function initStream() {
  currentUrlIdx = 0;
  errorState.classList.remove('show');
  loadStream(STREAM_URLS[0]);
}

/* ==========================================================================
   EVENTOS DEL VIDEO
   ========================================================================== */
videoEl.addEventListener('play', function() {
  setPlayIcon(true);
  bufOverlay.classList.remove('show');
  clearTimeout(safetyTimer);
});

videoEl.addEventListener('pause', function() {
  setPlayIcon(false);
});

videoEl.addEventListener('waiting', function() {
  bufOverlay.classList.add('show');
});

videoEl.addEventListener('canplay', function() {
  bufOverlay.classList.remove('show');
});

videoEl.addEventListener('playing', function() {
  bufOverlay.classList.remove('show');
  setStatus('ok', 'Señal OK');
});

videoEl.addEventListener('timeupdate', function() {
  if (isFinite(videoEl.duration) && videoEl.duration > 0) {
    timeDisp.textContent = fmtTime(videoEl.currentTime) + ' / ' + fmtTime(videoEl.duration);
  } else {
    timeDisp.textContent = fmtTime(videoEl.currentTime) + ' · LIVE';
  }
});

/* ==========================================================================
   CONTROLES
   ========================================================================== */
function togglePlay() {
  if (videoEl.paused) {
    if (!hls && !videoEl.src) {
      initStream();
      return;
    }
    videoEl.play().catch(function(e) {
      console.warn('No se pudo reproducir:', e);
    });
  } else {
    videoEl.pause();
  }
}

function toggleMute() {
  isMuted = !isMuted;
  if (isMuted) {
    prevVol = videoEl.volume;
    videoEl.volume = 0;
    volOn.style.display = 'none';
    volOff.style.display = '';
    document.getElementById('volSlider').value = 0;
  } else {
    videoEl.volume = prevVol;
    volOn.style.display = '';
    volOff.style.display = 'none';
    document.getElementById('volSlider').value = prevVol;
  }
}

function setVol(val) {
  var v = parseFloat(val);
  videoEl.volume = v;
  if (v === 0) {
    volOn.style.display = 'none';
    volOff.style.display = '';
    isMuted = true;
  } else {
    volOn.style.display = '';
    volOff.style.display = 'none';
    isMuted = false;
    prevVol = v;
  }
}

function goFullscreen() {
  var c = document.getElementById('videoContainer');
  if (c.requestFullscreen) {
    c.requestFullscreen();
  } else if (c.webkitRequestFullscreen) {
    c.webkitRequestFullscreen();
  } else if (c.msRequestFullscreen) {
    c.msRequestFullscreen();
  }
}

/* ==========================================================================
   ARRANQUE AUTOMÁTICO
   ========================================================================== */
document.addEventListener('DOMContentLoaded', function() {
  initStream();
});
</script>
</body>
</html>
