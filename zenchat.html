<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZenChat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#111;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
#header{display:flex;align-items:center;gap:10px;padding:8px 16px;background:#1a1a2e}
#header h1{font-size:16px;font-weight:600;color:#64b5f6}
#model-select{background:#222;color:#e0e0e0;border:1px solid #444;border-radius:4px;padding:4px 8px;font-size:13px}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{padding:10px 14px;border-radius:8px;max-width:85%;line-height:1.5;font-size:14px;white-space:pre-wrap;word-break:break-word}
.msg.user{background:#1e3a5f;align-self:flex-end}
.msg.assistant{background:#1e1e2e;align-self:flex-start;border:1px solid #333}
.msg.system{color:#888;font-style:italic;font-size:13px;text-align:center;align-self:center}
.msg.tool-call{background:#2a1f1f;color:#ffb74d;font-size:13px;font-family:monospace;border-left:3px solid #ffb74d}
.msg.tool-result{background:#1a1a1a;color:#aaa;font-size:13px;font-family:monospace;border-left:3px solid #666;max-height:200px;overflow-y:auto}
.msg.error{background:#3a1a1a;color:#ef5350;align-self:center;border:1px solid #ef5350}
#status-bar{height:24px;padding:4px 16px;font-size:12px;color:#888;background:#0d0d0d}
.status-text.running{color:#ffb74d}
.status-text.done{color:#66bb6a}
.status-text.error{color:#ef5350}
#input-area{display:flex;gap:8px;padding:8px 16px;background:#1a1a2e;border-top:1px solid #333}
#input{flex:1;background:#222;color:#e0e0e0;border:1px solid #444;border-radius:6px;padding:10px 14px;font-size:14px;outline:0}
#input:focus{border-color:#64b5f6}
#send-btn{background:#1565c0;color:#fff;border:none;border-radius:6px;padding:10px 18px;font-size:14px;cursor:pointer}
#send-btn:hover{background:#1976d2}
#send-btn:disabled{background:#444;cursor:not-allowed}
</style>
</head>
<body>
<div id="header">
  <span style="color:#555;font-size:12px"></span>
  <select id="model-select">
    <option>deepseek-v4-flash-free</option>
    <option>minimax-m2.5-free</option>
    <option>qwen3.6-plus-free</option>
  </select>
  <span style="font-size:11px;color:#666;margin-left:auto">Exa + cors.syrins.tech</span>
</div>
<div id="chat">
  <div class="msg system">asistente — herramientas: web_search</div>
</div>
<div id="status-bar"><span class="status-text" id="status-text">Listo</span></div>
<div id="input-area">
  <input id="input" type="text" placeholder="> tu mensaje..." autofocus>
  <button id="send-btn" onclick="send()">→</button>
</div>
<script>
const CORS_PROXY="https://api.cors.syrins.tech/?url=";
const ZEN_URL=CORS_PROXY+"https://opencode.ai/zen/v1/chat/completions";
const EXA_KEY="f52ee35f-89a8-470f-bf3e-1e0b5f2bbdb8";
const HDR={Authorization:"Bearer public","Content-Type":"application/json","User-Agent":"opencode/1.15.0","x-opencode-client":"cli","x-opencode-project":"global"};
const TOOLS=[{type:"function",function:{name:"web_search",description:"Search the web for current information. Get 3 results with title + URL + snippet. Use ONLY for info that changes (news, events, prices, versions). After getting results, respond immediately. Do NOT search again.",parameters:{type:"object",properties:{query:{type:"string",description:"Specific search query"}},required:["query"]}}}];
const TM={web_search:webSearch};
const $=id=>document.getElementById(id);
const chat=$("chat"),inp=$("input"),btn=$("send-btn"),st=$("status-text"),msel=$("model-select");
let msgs=[],busy=false;

function addMsg(role,content){
  let e=document.createElement("div");
  e.className="msg "+role;
  e.textContent=content;
  chat.appendChild(e);
  chat.scrollTop=chat.scrollHeight;
  return e;
}

function setStatus(text,cls){
  st.textContent=text;
  st.className="status-text"+(cls?" "+cls:"");
}

async function webSearch(args){
  let q=args.query||"";
  if(!q) return "Error: query required";
  let n=Math.min(parseInt(args.numResults||"3",10)||3,5);
  let r=await fetch(CORS_PROXY+"https://api.exa.ai/search",{
    method:"POST",
    headers:{"x-api-key":EXA_KEY,"Content-Type":"application/json"},
    body:JSON.stringify({query:q,type:"neural",numResults:Math.min(n,10)})
  });
  if(!r.ok) return "Search error: HTTP "+r.status;
  let d=await r.json(), rs=d.results||[];
  if(!rs.length) return "(sin resultados)";
  let o='Resultados de "'+q+'":';
  for(let x of rs.slice(0,n)){
    o+="\n\n* "+(x.title||"?");
    o+="\n  "+(x.url||"");
    o+="\n  "+(x.snippet||"");
  }
  return o;
}

async function webFetch(args){
  let u=args.url||"";
  if(!u) return "Error: url required";
  let r=await fetch(CORS_PROXY+u,{signal:AbortSignal.timeout(15000)});
  let t=await r.text();
  return "URL: "+u+"\nStatus: "+r.status+"\n\n"+t.slice(0,5000);
}

async function send(){
  let t=inp.value.trim();
  if(!t||busy) return;
  inp.value="";
  addMsg("user",t);
  setStatus("Pensando...","running");
  busy=true;
  btn.disabled=true;
  msgs.push({role:"user",content:t});

  for(let iter=0; iter<10; iter++){
    let body=JSON.stringify({
      model:msel.value,
      messages:[{role:"system",content:"Eres un asistente conciso.\n\nREGLAS:\n- Responde directamente. No busques si puedes responder.\n- web_search: UNA sola llamada como maximo. Devuelve 3 resultados. Responde con lo que encontraste aunque sea parcial. No refines ni hagas otra busqueda.\n- web_fetch no existe. No puedes llamarlo."},...msgs],
      tools:TOOLS,
      stream:false,
      max_tokens:16384
    });

    try {
      let resp=await fetch(ZEN_URL,{method:"POST",headers:HDR,body});
      if(!resp.ok){
        let e=await resp.text();
        throw Error("HTTP "+resp.status+": "+e.slice(0,200));
      }
      let data=await resp.json();
      let msg=data.choices?.[0]?.message;
      if(!msg) throw Error("Respuesta vacia del modelo");

      let content=msg.content||"";
      let tcs=msg.tool_calls||[];

      if(content) addMsg("assistant",content);

      if(tcs.length){
        msgs.push({role:"assistant",content,tool_calls:tcs});
      } else if(content){
        msgs.push({role:"assistant",content});
      }

      if(!tcs.length){
        setStatus("Listo","done");
        busy=false; btn.disabled=false;
        return;
      }

      setStatus("Ejecutando "+tcs.length+" herramienta(s)...","running");
      for(let tc of tcs){
        addMsg("tool-call",tc.function.name+"("+(tc.function.arguments||"").slice(0,200)+")");
      }
      let rr=await Promise.all(tcs.map(async tc=>{
        let fn=tc.function.name,as=tc.function.arguments;
        let a={};
        try{a=JSON.parse(as)}catch(e){}
        let fn2=TM[fn], r=fn2?await fn2(a):"Unknown tool: "+fn;
        addMsg("tool-result", r.length>500?r.slice(0,500)+"\n...[truncado]":r);
        return {id:tc.id,content:r};
      }));
      for(let x of rr) msgs.push({role:"tool",tool_call_id:x.id,content:x.content});
    } catch(e){
      addMsg("error","Error: "+e.message);
      setStatus("Error","error");
      busy=false; btn.disabled=false;
      return;
    }
  }

  setStatus("Max iteraciones","error");
  addMsg("error","Maximo de iteraciones alcanzado");
  busy=false; btn.disabled=false;
}

inp.addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});
</script>
</body>
</html>
