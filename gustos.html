<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Me Gusta / No Me Gusta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#43A047;
  --green-light:#81C784;
  --green-bg:#E8F5E9;
  --red:#E53935;
  --red-light:#EF9A9A;
  --red-bg:#FFEBEE;
  --purple:#7B1FA2;
  --blue:#3F51B5;
  --card-shadow:0 8px 32px rgba(0,0,0,0.18);
}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;user-select:none;-webkit-user-select:none}
body{
  background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);
  background-size:400% 400%;
  animation:bgShift 12s ease infinite;
}
@keyframes bgShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* floating decorations */
.bg-shape{
  position:fixed;border-radius:50%;pointer-events:none;
  background:rgba(255,255,255,0.07);z-index:0;
  animation:floatShape 20s ease-in-out infinite;
}
.bg-shape:nth-child(1){width:300px;height:300px;top:-80px;left:-80px;animation-delay:0s}
.bg-shape:nth-child(2){width:200px;height:200px;bottom:-50px;right:-50px;animation-delay:-7s}
.bg-shape:nth-child(3){width:150px;height:150px;top:40%;right:10%;animation-delay:-14s}
.bg-shape:nth-child(4){width:100px;height:100px;bottom:20%;left:15%;animation-delay:-4s}
@keyframes floatShape{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-30px) scale(1.1)}
  66%{transform:translate(-20px,20px) scale(0.9)}
}

#app{
  position:relative;z-index:1;
  display:grid;grid-template-rows:auto 1fr auto;
  height:100dvh;max-height:100dvh;
  padding:8px;
  gap:4px;
}

/* header */
header{
  text-align:center;padding:10px 12px 6px;
  position:relative;
}
header h1{
  font-size:clamp(1rem,4vw,1.5rem);font-weight:900;
  color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.2);
  letter-spacing:0.02em;
}
.progress-dots{
  display:flex;justify-content:center;flex-wrap:wrap;gap:6px;
  margin-top:6px;padding:0 8px;max-height:40px;overflow-y:auto;
}
.dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.4);
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.dot.active{background:#FFD54F;border-color:#FFD54F;transform:scale(1.3);box-shadow:0 0 16px rgba(255,213,79,0.5)}
.dot.done{background:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.6)}

/* main grid */
main{
  display:grid;
  grid-template-columns:minmax(60px,1fr) minmax(160px,2.4fr) minmax(60px,1fr);
  gap:clamp(4px,1.5vw,16px);
  align-items:stretch;
  flex:1;min-height:0;
}

/* columns */
.column{
  position:relative;border-radius:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:12px 6px;
  transition:all 0.3s ease;
  border:3px solid transparent;
}
.column-like{
  background:rgba(67,160,71,0.12);
  backdrop-filter:blur(4px);
}
.column-like .col-icon{font-size:clamp(1.6rem,5vw,3rem)}
.column-like .col-label{
  font-size:clamp(0.65rem,1.6vw,1rem);font-weight:800;
  color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.3);
  writing-mode:horizontal-tb;text-align:center;
  margin-top:4px;line-height:1.1;
}
.column-like .col-sub{
  font-size:clamp(0.5rem,1vw,0.75rem);font-weight:600;
  color:rgba(255,255,255,0.7);margin-top:2px;
}
.column-dislike{
  background:rgba(229,57,53,0.12);
  backdrop-filter:blur(4px);
}
.column-dislike .col-icon{font-size:clamp(1.6rem,5vw,3rem)}
.column-dislike .col-label{
  font-size:clamp(0.65rem,1.6vw,1rem);font-weight:800;
  color:#fff;text-shadow:0 1px 6px rgba(0,0,0,0.3);
  writing-mode:horizontal-tb;text-align:center;
  margin-top:4px;line-height:1.1;
}
.column-dislike .col-sub{
  font-size:clamp(0.5rem,1vw,0.75rem);font-weight:600;
  color:rgba(255,255,255,0.7);margin-top:2px;
}

/* column highlight during drag */
.column-like.highlight{
  background:rgba(67,160,71,0.35);
  box-shadow:inset 0 0 40px rgba(67,160,71,0.2);
  transform:scale(1.03);
}
.column-dislike.highlight{
  background:rgba(229,57,53,0.35);
  box-shadow:inset 0 0 40px rgba(229,57,53,0.2);
  transform:scale(1.03);
}
.column-like.highlight .col-label{color:#C8E6C9}
.column-dislike.highlight .col-label{color:#FFCDD2}

/* center column - card area */
.column-center{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:visible;
}

/* card */
.card-wrapper{
  position:relative;
  width:100%;max-width:260px;
  aspect-ratio:3/4;
  touch-action:none;
}
.card-wrapper.idle{animation:idleFloat 3s ease-in-out infinite}
@keyframes idleFloat{
  0%,100%{transform:translateY(0px)}
  50%{transform:translateY(-10px)}
}

.card{
  position:absolute;inset:0;
  background:rgba(255,255,255,0.95);
  border-radius:24px;
  box-shadow:var(--card-shadow);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;
  cursor:grab;
  will-change:transform;
  transform:translate(var(--dx,0px),var(--dy,0px)) rotate(var(--rot,0deg));
  transition:transform 0.05s linear;
  overflow:hidden;
}
.card.dragging{cursor:grabbing;box-shadow:0 16px 48px rgba(0,0,0,0.25)}
.card.flying{transition:transform 0.45s cubic-bezier(0.22,1,0.36,1) !important}
.card.snapping{transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1) !important}

.card-emoji{
  font-size:clamp(3.5rem,12vw,5.5rem);
  line-height:1;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,0.1));
  transition:transform 0.3s ease;
}
.card.dragging .card-emoji{transform:scale(0.9)}
.card-label{
  font-size:clamp(1.2rem,4vw,1.8rem);font-weight:800;
  color:#333;text-align:center;
  line-height:1.2;
}
.card-hint{
  font-size:clamp(0.6rem,1.8vw,0.85rem);font-weight:600;
  color:rgba(0,0,0,0.3);
  display:flex;align-items:center;gap:6px;
  margin-top:4px;
}
.card-hint .arrow{display:inline-block;animation:hintArrow 1.5s ease-in-out infinite}
@keyframes hintArrow{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(6px)}
}

/* card accent stripe */
.card::after{
  content:'';position:absolute;top:0;left:0;right:0;
  height:clamp(4px,1vw,6px);
  background:var(--accent,#667eea);
  border-radius:24px 24px 0 0;
}

/* drop zone indicators */
.drop-zone-indicator{
  position:absolute;top:50%;transform:translateY(-50%);
  font-size:2rem;opacity:0;
  transition:all 0.3s ease;
  pointer-events:none;
}
.drop-zone-indicator.left{left:-20px}
.drop-zone-indicator.right{right:-20px}
.card.dragging ~ .drop-zone-indicator.show{opacity:1;transform:translateY(-50%) scale(1.2)}

/* footer score */
footer{
  display:flex;justify-content:center;gap:clamp(20px,6vw,60px);
  padding:8px 12px 12px;
}
.score-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 16px;border-radius:30px;
  font-weight:700;font-size:clamp(0.85rem,2.5vw,1.1rem);
  color:#fff;
  backdrop-filter:blur(8px);
  transition:all 0.3s ease;
}
.score-like{background:rgba(67,160,71,0.45)}
.score-dislike{background:rgba(229,57,53,0.45)}
.score-item .num{font-weight:900;font-size:1.2em;min-width:1.4em;text-align:center}
.score-like.pop{animation:scorePop 0.4s ease}
.score-dislike.pop{animation:scorePop 0.4s ease}
@keyframes scorePop{
  0%{transform:scale(1)}
  50%{transform:scale(1.25)}
  100%{transform:scale(1)}
}

/* results overlay */
#results-overlay{
  position:fixed;inset:0;z-index:100;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);
  padding:20px;
  overflow-y:auto;
}
#results-overlay.open{display:flex}
#results-overlay h2{
  font-size:clamp(1.5rem,5vw,2.2rem);font-weight:900;
  color:#fff;margin-bottom:4px;
  text-shadow:0 2px 12px rgba(0,0,0,0.2);
}
#results-overlay .sub{
  font-size:clamp(0.9rem,2.5vw,1.1rem);font-weight:600;
  color:rgba(255,255,255,0.8);margin-bottom:20px;
}
.results-list{
  display:flex;flex-direction:column;gap:10px;
  width:100%;max-width:360px;
  margin-bottom:20px;
}
.result-item{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(8px);
  padding:12px 16px;border-radius:16px;
  color:#fff;
  transform:scale(0);animation:resultItem 0.4s ease forwards;
}
/* delays set inline via JS */
@keyframes resultItem{
  0%{transform:scale(0);opacity:0}
  100%{transform:scale(1);opacity:1}
}
.result-item .ri-emoji{font-size:2rem;line-height:1}
.result-item .ri-label{font-size:1rem;font-weight:700;flex:1}
.result-item .ri-verdict{font-size:1.3rem}
.result-total{margin:12px 0 20px;display:flex;gap:24px}
.result-total span{font-size:1.1rem;font-weight:700;color:#fff;padding:4px 16px;border-radius:20px}
.result-total .rt-like{background:rgba(67,160,71,0.5)}
.result-total .rt-dislike{background:rgba(229,57,53,0.5)}
.btn-replay{
  background:#fff;border:none;
  padding:14px 40px;border-radius:50px;
  font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:800;
  color:#764ba2;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
  transition:all 0.3s ease;
}
.btn-replay:hover{transform:scale(1.05);box-shadow:0 6px 28px rgba(0,0,0,0.2)}
.btn-replay:active{transform:scale(0.97)}

/* confetti */
.confetti-container{
  position:fixed;inset:0;pointer-events:none;z-index:101;
  overflow:hidden;
}
.confetti-piece{
  position:absolute;top:-10px;width:10px;height:10px;
  border-radius:2px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* fullscreen entry animation */
.card-wrapper.entering{
  animation:cardEnter 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes cardEnter{
  0%{transform:scale(0.3) translateY(60px);opacity:0}
  100%{transform:scale(1) translateY(0);opacity:1}
}

/* fly trail */
.card.flying::before{
  content:'';position:absolute;inset:0;
  border-radius:24px;
  background:inherit;
  opacity:0.3;
  animation:flyTrail 0.45s ease forwards;
}
@keyframes flyTrail{
  0%{transform:scale(1);opacity:0.3}
  100%{transform:scale(0.8) translateX(-30px);opacity:0}
}

/* responsive */
@media(max-width:480px){
  #app{padding:4px;gap:2px}
  header h1{font-size:clamp(0.9rem,4vw,1.1rem)}
  header{padding:6px 8px 2px}
  .dot{width:8px;height:8px}
  .progress-dots{gap:4px;margin-top:3px}
  main{grid-template-columns:44px 1fr 44px;gap:3px}
  .column{padding:8px 3px;border-radius:14px}
  .column-like .col-label,.column-dislike .col-label{font-size:0.6rem}
  .column-like .col-sub,.column-dislike .col-sub{display:none}
  .card-wrapper{max-width:180px}
  .card-hint{font-size:0.6rem}
}
@media(min-width:481px)and(max-width:768px){
  main{gap:8px}
  .card-wrapper{max-width:220px}
}
@media(min-width:769px){
  main{padding:0 24px}
  .column-like .col-label,.column-dislike .col-label{font-size:1rem}
}

/* landscape mobile */
@media(max-height:500px){
  header h1{font-size:0.9rem}
  header{padding:4px 8px}
  .progress-dots{margin-top:2px}
  .dot{width:6px;height:6px}
  .progress-dots{gap:3px}
  .card-wrapper{max-width:140px;aspect-ratio:2/3}
  .card-emoji{font-size:2.5rem}
  .card-label{font-size:0.9rem}
  footer{padding:4px 12px}
  .score-item{padding:3px 12px;font-size:0.75rem}
}
</style>
</head>
<body>

<!-- floating background shapes -->
<div class="bg-shape"></div>
<div class="bg-shape"></div>
<div class="bg-shape"></div>
<div class="bg-shape"></div>

<div id="app">
  <header>
    <h1>🎯 Me Gusta / No Me Gusta</h1>
    <div class="progress-dots" id="dots"></div>
  </header>

  <main>
    <div class="column column-like" id="col-like">
      <div class="col-icon">😊</div>
      <div class="col-label">ME GUSTA</div>
      <div class="col-sub">arrastrá acá</div>
    </div>

    <div class="column column-center" id="col-center">
      <div class="card-wrapper idle entering" id="card-wrap">
        <div class="card" id="card">
          <div class="card-emoji" id="card-emoji"></div>
          <div class="card-label" id="card-label"></div>
          <div class="card-hint">
            <span>👆</span>
            <span>arrástrame</span>
            <span class="arrow">→</span>
          </div>
        </div>
      </div>
    </div>

    <div class="column column-dislike" id="col-dislike">
      <div class="col-icon">😞</div>
      <div class="col-label">NO ME GUSTA</div>
      <div class="col-sub">arrastrá acá</div>
    </div>
  </main>

  <footer>
    <div class="score-item score-like" id="score-like">
      <span>😊</span>
      <span class="num" id="like-num">0</span>
    </div>
    <div class="score-item score-dislike" id="score-dislike">
      <span>😞</span>
      <span class="num" id="dislike-num">0</span>
    </div>
  </footer>
</div>

<!-- results overlay -->
<div id="results-overlay">
  <h2>🎉 ¡Completaste!</h2>
  <div class="sub">Así quedaron tus gustos</div>
  <div class="results-list" id="results-list"></div>
  <div class="result-total">
    <span class="rt-like" id="rt-like">😊 0</span>
    <span class="rt-dislike" id="rt-dislike">😞 0</span>
  </div>
  <button class="btn-replay" id="btn-replay">🔄 Jugar de nuevo</button>
</div>

<!-- confetti container -->
<div class="confetti-container" id="confetti"></div>

<script>
const items = [
  { emoji: '🥟', label: 'Empanadas', accent: '#D4A574' },
  { emoji: '🍝', label: 'Ravioles', accent: '#E8B4B8' },
  { emoji: '😱', label: 'Gritar', accent: '#FF5252' },
  { emoji: '🤫', label: 'No gritar', accent: '#90A4AE' },
  { emoji: '🎵', label: 'Música', accent: '#7C4DFF' },
  { emoji: '📖', label: 'Leer cuentos', accent: '#FF8A65' },
  { emoji: '🔴', label: 'Rojo', accent: '#F44336' },
  { emoji: '🔵', label: 'Azul', accent: '#2196F3' },
  { emoji: '✏️', label: 'Escribir', accent: '#607D8B' },
  { emoji: '🧩', label: 'Rompecabezas', accent: '#FFB74D' },
  { emoji: '🥐', label: 'Masas', accent: '#A1887F' },
  { emoji: '🚲', label: 'Bicicleta', accent: '#4CAF50' },
  { emoji: '🎤', label: 'Cantar', accent: '#E91E63' },
  { emoji: '🧮', label: 'Matemáticas', accent: '#00BCD4' },
  { emoji: '🐟', label: 'Peces', accent: '#3F51B5' },
];

let currentIdx = 0;
let results = [];
let likeCount = 0;
let dislikeCount = 0;
let isDragging = false;
let startX = 0;
let startY = 0;
let ctrlX = 0;
let ctrlY = 0;
let pointerId = null;
let isFlying = false;

const card = document.getElementById('card');
const wrap = document.getElementById('card-wrap');
const emojiEl = document.getElementById('card-emoji');
const labelEl = document.getElementById('card-label');
const dotsEl = document.getElementById('dots');
const likeNum = document.getElementById('like-num');
const dislikeNum = document.getElementById('dislike-num');
const colLike = document.getElementById('col-like');
const colDislike = document.getElementById('col-dislike');
const scoreLike = document.getElementById('score-like');
const scoreDislike = document.getElementById('score-dislike');

function buildDots(){
  dotsEl.innerHTML = '';
  for(let i=0;i<items.length;i++){
    const d = document.createElement('div');
    d.className = 'dot' + (i===currentIdx ? ' active' : '');
    d.dataset.idx = i;
    dotsEl.appendChild(d);
  }
}

function updateDots(){
  const all = dotsEl.querySelectorAll('.dot');
  all.forEach((d,i)=>{
    d.className = 'dot';
    if(i===currentIdx && i<items.length) d.classList.add('active');
    else if(i<currentIdx) d.classList.add('done');
  });
}

function showCard(idx){
  if(idx>=items.length){ showResults(); return; }
  const item = items[idx];
  emojiEl.textContent = item.emoji;
  labelEl.textContent = item.label;
  card.style.setProperty('--accent',item.accent);
  card.style.setProperty('--dx','0px');
  card.style.setProperty('--dy','0px');
  card.style.setProperty('--rot','0deg');
  card.style.transition = '';
  card.className = 'card';
  wrap.className = 'card-wrapper idle';
  void wrap.offsetWidth; // force reflow
  wrap.classList.add('entering');
  setTimeout(()=>wrap.classList.remove('entering'),600);
  updateDots();
  colLike.classList.remove('highlight');
  colDislike.classList.remove('highlight');
  isFlying = false;
}

function showResults(){
  document.getElementById('results-overlay').classList.add('open');
  const list = document.getElementById('results-list');
  list.innerHTML = '';
  results.forEach((r,i)=>{
    const div = document.createElement('div');
    div.className = 'result-item';
    div.style.animationDelay = (0.08 * i) + 's';
    div.innerHTML = `
      <span class="ri-emoji">${r.emoji}</span>
      <span class="ri-label">${r.label}</span>
      <span class="ri-verdict">${r.like?'😊':'😞'}</span>
    `;
    list.appendChild(div);
  });
  document.getElementById('rt-like').textContent = '😊 '+likeCount;
  document.getElementById('rt-dislike').textContent = '😞 '+dislikeCount;
  launchConfetti();
}

function launchConfetti(){
  const c = document.getElementById('confetti');
  c.innerHTML = '';
  const colors = ['#FF6B6B','#4ECDC4','#FFD93D','#A78BFA','#F472B6','#60A5FA','#34D399','#FBBF24'];
  for(let i=0;i<80;i++){
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random()*colors.length)];
    const left = Math.random()*100;
    const size = 6+Math.random()*10;
    const dur = 1.5+Math.random()*2.5;
    const delay = Math.random()*2;
    piece.style.cssText = `
      left:${left}%;width:${size}px;height:${size}px;
      background:${color};
      animation-duration:${dur}s;animation-delay:${delay}s;
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    c.appendChild(piece);
  }
  setTimeout(()=>c.innerHTML='',5000);
}

function resetGame(){
  document.getElementById('results-overlay').classList.remove('open');
  currentIdx = 0;
  results = [];
  likeCount = 0;
  dislikeCount = 0;
  likeNum.textContent = '0';
  dislikeNum.textContent = '0';
  document.getElementById('confetti').innerHTML = '';
  buildDots();
  showCard(0);
}

// pointer events
function getDeltaX(e){
  return e.clientX - startX;
}
function getDeltaY(e){
  return e.clientY - startY;
}

function onPointerDown(e){
  if(isFlying) return;
  e.preventDefault();
  isDragging = true;
  pointerId = e.pointerId;
  startX = e.clientX;
  startY = e.clientY;
  ctrlX = 0;
  ctrlY = 0;
  card.setPointerCapture(pointerId);
  wrap.classList.remove('idle','entering');
  card.classList.add('dragging');
  card.style.transition = 'none';
}

function onPointerMove(e){
  if(!isDragging) return;
  e.preventDefault();
  const dx = getDeltaX(e);
  const dy = getDeltaY(e);
  const rot = dx * 0.08;
  const clampDy = dy * 0.3;
  ctrlX = dx;
  ctrlY = clampDy;
  card.style.setProperty('--dx',dx+'px');
  card.style.setProperty('--dy',clampDy+'px');
  card.style.setProperty('--rot',rot+'deg');

  // column highlighting
  // dragging LEFT → toward ME GUSTA column; dragging RIGHT → toward NO ME GUSTA
  const threshold = Math.min(60, window.innerWidth * 0.08);
  if(dx < -threshold){
    colLike.classList.add('highlight');
    colDislike.classList.remove('highlight');
  } else if(dx > threshold){
    colDislike.classList.add('highlight');
    colLike.classList.remove('highlight');
  } else {
    colLike.classList.remove('highlight');
    colDislike.classList.remove('highlight');
  }
}

function onPointerUp(e){
  if(!isDragging) return;
  isDragging = false;
  card.classList.remove('dragging');
  card.releasePointerCapture(pointerId);
  pointerId = null;

  const dx = ctrlX;
  const absDx = Math.abs(dx);
  const threshold = Math.max(100, window.innerWidth * 0.2);

  if(absDx > threshold){
    const isLike = dx < 0; // dragging left → ME GUSTA, dragging right → NO ME GUSTA
    flyTo(isLike ? 'like' : 'dislike');
  } else {
    snapBack();
  }
}

function snapBack(){
  card.classList.add('snapping');
  card.style.setProperty('--dx','0px');
  card.style.setProperty('--dy','0px');
  card.style.setProperty('--rot','0deg');
  colLike.classList.remove('highlight');
  colDislike.classList.remove('highlight');
  setTimeout(()=>{
    card.classList.remove('snapping');
    card.style.transition = '';
    wrap.classList.add('idle');
  },500);
}

function flyTo(target){
  isFlying = true;
  card.classList.add('flying');
  const isLike = target === 'like';
  const flyX = isLike ? -(window.innerWidth * 0.6) : window.innerWidth * 0.6;
  card.style.setProperty('--dx',flyX+'px');
  card.style.setProperty('--dy','0px');
  card.style.setProperty('--rot',(isLike?-15:15)+'deg');

  // update score
  if(isLike){
    likeCount++;
    likeNum.textContent = likeCount;
    scoreLike.classList.remove('pop');
    void scoreLike.offsetWidth;
    scoreLike.classList.add('pop');
  } else {
    dislikeCount++;
    dislikeNum.textContent = dislikeCount;
    scoreDislike.classList.remove('pop');
    void scoreDislike.offsetWidth;
    scoreDislike.classList.add('pop');
  }

  colLike.classList.remove('highlight');
  colDislike.classList.remove('highlight');

  const item = items[currentIdx];
  results.push({emoji:item.emoji, label:item.label, like:isLike});

  setTimeout(()=>{
    card.classList.remove('flying');
    card.style.transition = '';
    currentIdx++;
    showCard(currentIdx);
  },480);
}

// set up listeners
card.addEventListener('pointerdown', onPointerDown);
document.addEventListener('pointermove', onPointerMove);
document.addEventListener('pointerup', onPointerUp);
document.addEventListener('pointercancel', onPointerUp);

// replay button
document.getElementById('btn-replay').addEventListener('click', resetGame);

// init
buildDots();
showCard(0);
</script>
