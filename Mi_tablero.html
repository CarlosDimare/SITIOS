<title>Mi tablero</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; touch-action: manipulation; }
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
  gap: 3px;
  padding: 3px;
  height: 100%;
  width: 100%;
  background: #d4d4d4;
}
.c {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  cursor: pointer;
  overflow: hidden;
  padding: 4px;
  touch-action: manipulation;
  transition: transform 0.1s;
}
.c:active { transform: scale(0.95); }
.c img {
  max-width: 65%;
  max-height: 55%;
  pointer-events: none;
  object-fit: contain;
}
.c .lbl {
  font-size: clamp(10px, 2.5vmin, 18px);
  text-align: center;
  line-height: 1.2;
  pointer-events: none;
  padding: 2px;
  font-weight: 500;
  max-width: 100%;
  word-break: break-word;
}
.c.empty { background: #f0f0f0; }
@media (orientation: portrait) and (max-aspect-ratio: 3/4) {
  .c .lbl { font-size: clamp(9px, 3vmin, 20px); }
}
</style>

  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'es';
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    window.speechSynthesis.speak(utterance);
  }

  function playAudio(dataUri) {
    window.speechSynthesis.cancel();
    var audio = new Audio(dataUri);
    audio.play().catch(function(){});
  }

  // Fullscreen on tap for older tablets (double-tap to fullscreen)
  var fsEl = document.documentElement;
  function toggleFS() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      if (fsEl.requestFullscreen) fsEl.requestFullscreen();
      else if (fsEl.webkitRequestFullscreen) fsEl.webkitRequestFullscreen();
    }
  }

  // Click handler — reproduce audio grabado o habla el texto
  grid.addEventListener('click', function(e) {
    var cell = e.target.closest('.c');
    if (!cell || cell.classList.contains('empty')) return;
    var idx = parseInt(cell.getAttribute('data-i'));
    if (audioData[idx]) {
      playAudio(audioData[idx]);
      return;
    }
    var label = cell.querySelector('.lbl');
    if (label && label.textContent.trim()) {
      speak(label.textContent.trim());
    }
  });

  // Long-press → fullscreen
  var pressTimer = null;
  grid.addEventListener('touchstart', function(e) {
    pressTimer = setTimeout(toggleFS, 800);
  });
  grid.addEventListener('touchend', function() { clearTimeout(pressTimer); });
  grid.addEventListener('touchmove', function() { clearTimeout(pressTimer); });
})();
</script>
