<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logopedia Digital - Intrusos Marinos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f9ff; /* Azul agua muy claro */
        }

        .card-item {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border-width: 4px;
        }

        .card-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .card-item:active {
            transform: scale(0.95);
        }

        .success-animation {
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: rise 4s infinite ease-in;
        }

        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden relative">
    
    <!-- Burbujas decorativas de fondo -->
    <div id="bubbles-container"></div>

    <div id="app" class="max-w-4xl w-full bg-white rounded-[40px] shadow-2xl overflow-hidden border-8 border-blue-100 z-10">
        <!-- Cabecera Visual -->
        <div class="bg-blue-500 p-8 text-white text-center relative">
            <h1 class="text-3xl font-black uppercase tracking-tighter">¡Intrusos en el Mar! 🌊</h1>
            <p class="text-blue-100 font-bold">Busca al animal que empieza con un sonido diferente</p>
            
            <div class="flex justify-between mt-6 items-center">
                <div class="bg-blue-700 rounded-2xl px-6 py-2 font-bold shadow-inner">
                    Nivel: <span id="round-count">1</span> / 10
                </div>
                <div class="bg-yellow-400 text-blue-900 rounded-2xl px-6 py-2 font-black shadow-lg">
                    🐚 <span id="score-count">0</span>
                </div>
            </div>
        </div>

        <!-- Área de Juego -->
        <div class="p-8">
            <!-- Barra de Progreso -->
            <div class="flex gap-2 mb-8 justify-center" id="progress-dots"></div>

            <div id="game-area" class="flex flex-col items-center">
                <div id="options-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full mb-8">
                    <!-- Fichas dinámicas -->
                </div>
            </div>

            <!-- Panel de Explicación -->
            <div id="feedback-panel" class="min-h-[120px] bg-blue-50 rounded-3xl p-6 flex flex-col items-center justify-center text-center transition-all opacity-0 border-2 border-dashed border-blue-200">
                <h3 id="feedback-title" class="text-xl font-bold mb-1"></h3>
                <p id="feedback-text" class="text-gray-600 font-medium"></p>
            </div>
        </div>

        <!-- Footer -->
        <div class="bg-gray-50 p-4 text-center text-blue-300 font-bold text-sm uppercase tracking-widest">
            Edición Marina: Conciencia Fonológica
        </div>
    </div>

    <!-- Modal Final -->
    <div id="result-modal" class="fixed inset-0 bg-blue-900/80 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[40px] p-10 max-w-sm w-full text-center shadow-2xl border-t-8 border-blue-400">
            <div class="text-7xl mb-4">🐳</div>
            <h2 class="text-3xl font-black text-blue-600 mb-2">¡MISIÓN CUMPLIDA!</h2>
            <p id="final-message" class="text-gray-500 font-medium mb-8 text-lg"></p>
            <button onclick="location.reload()" class="bg-blue-500 hover:bg-blue-600 text-white font-black py-4 px-10 rounded-2xl w-full shadow-lg transition-transform active:scale-95 text-xl">
                NADAR OTRA VEZ
            </button>
        </div>
    </div>

    <script>
        // Diccionario exclusivo con temática marina
        const dictionary = {
            'B': [{w: 'Ballena', e: '🐳'}, {w: 'Barco', e: '🚢'}, {w: 'Buzo', e: '🤿'}],
            'P': [{w: 'Pez', e: '🐟'}, {w: 'Pulpo', e: '🐙'}, {w: 'Pingüino', e: '🐧'}],
            'C': [{w: 'Cangrejo', e: '🦀'}, {w: 'Caballito', e: '🐴'}, {w: 'Concha', e: '🐚'}],
            'T': [{w: 'Tiburón', e: '🦈'}, {w: 'Tortuga', e: '🐢'}, {w: 'Tesoro', e: '💰'}],
            'F': [{w: 'Foca', e: '🦭'}, {w: 'Faro', e: '🚨'}, {w: 'Fondo', e: '🌊'}],
            'A': [{w: 'Almeja', e: '🦪'}, {w: 'Ancla', e: '⚓'}, {w: 'Alga', e: '🌿'}],
            'E': [{w: 'Estrella', e: '⭐'}, {w: 'Erizo', e: '🦔'}, {w: 'Esponja', e: '🧽'}],
            'O': [{w: 'Ola', e: '🌊'}, {w: 'Ostra', e: '🦪'}, {w: 'Océano', e: '🌎'}]
        };

        let score = 0;
        let round = 1;
        let isWaiting = false;
        const totalRounds = 10;
        const keys = Object.keys(dictionary);

        function createBubbles() {
            const container = document.getElementById('bubbles-container');
            for(let i=0; i<15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 40 + 10 + 'px';
                bubble.style.width = size;
                bubble.style.height = size;
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.animationDelay = Math.random() * 4 + 's';
                container.appendChild(bubble);
            }
        }

        function initProgressDots() {
            const container = document.getElementById('progress-dots');
            for(let i=0; i<totalRounds; i++) {
                const dot = document.createElement('div');
                dot.className = `h-3 w-3 rounded-full bg-blue-100 transition-all duration-500 dot-${i+1}`;
                container.appendChild(dot);
            }
        }

        function generateRound() {
            if (round > totalRounds) {
                showResults();
                return;
            }

            isWaiting = false;
            document.getElementById('round-count').innerText = round;
            document.getElementById('feedback-panel').classList.add('opacity-0');
            updateDots();

            const mainKey = keys[Math.floor(Math.random() * keys.length)];
            const mainGroup = [...dictionary[mainKey]].sort(() => 0.5 - Math.random()).slice(0, 2);

            const otherKeys = keys.filter(k => k !== mainKey);
            const intruderKey = otherKeys[Math.floor(Math.random() * otherKeys.length)];
            const intruderData = dictionary[intruderKey][Math.floor(Math.random() * dictionary[intruderKey].length)];

            const options = [
                { ...mainGroup[0], isIntruder: false, key: mainKey },
                { ...mainGroup[1], isIntruder: false, key: mainKey },
                { ...intruderData, isIntruder: true, key: intruderKey }
            ].sort(() => 0.5 - Math.random());

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            options.forEach(opt => {
                const card = document.createElement('div');
                card.className = 'card-item bg-white border-blue-50 rounded-[32px] p-6 flex flex-col items-center justify-center shadow-xl';
                card.innerHTML = `
                    <span class="text-6xl mb-4">${opt.e}</span>
                    <span class="text-xl font-bold text-blue-600 uppercase tracking-widest">${opt.w}</span>
                `;
                card.onclick = () => handleChoice(opt, card, mainKey);
                container.appendChild(card);
            });
        }

        function updateDots() {
            const dots = document.querySelectorAll('#progress-dots div');
            dots.forEach((dot, idx) => {
                if (idx < round - 1) dot.className = 'h-3 w-8 rounded-full bg-blue-400 transition-all';
                else if (idx === round - 1) dot.className = 'h-3 w-8 rounded-full bg-blue-200 animate-pulse';
            });
        }

        function handleChoice(opt, element, groupKey) {
            if (isWaiting) return;

            const panel = document.getElementById('feedback-panel');
            const title = document.getElementById('feedback-title');
            const text = document.getElementById('feedback-text');

            panel.classList.remove('opacity-0');

            if (opt.isIntruder) {
                isWaiting = true;
                score++;
                document.getElementById('score-count').innerText = score;
                element.classList.add('border-green-400', 'bg-green-50', 'success-animation');
                
                title.innerText = "¡SÍ! LO ENCONTRASTE 🐙";
                title.className = "text-2xl font-black text-green-600 mb-1";
                text.innerText = `"${opt.w}" es el intruso porque empieza con /${opt.key}/. Los otros empiezan con /${groupKey}/.`;

                setTimeout(() => {
                    round++;
                    generateRound();
                }, 3000);
            } else {
                element.classList.add('border-red-400', 'shake');
                title.innerText = "¡ESTE NO ES! 🌊";
                title.className = "text-2xl font-black text-red-500 mb-1";
                text.innerText = `"${opt.w}" empieza con /${groupKey}/ igual que su amigo marino. ¡Busca al diferente!`;
                
                setTimeout(() => {
                    element.classList.remove('shake', 'border-red-400');
                }, 800);
            }
        }

        function showResults() {
            document.getElementById('result-modal').style.display = 'flex';
            document.getElementById('final-message').innerText = `¡Burbujeante! Has encontrado ${score} de ${totalRounds} intrusos marinos.`;
        }

        createBubbles();
        initProgressDots();
        generateRound();
    </script>
</body>
</html>
