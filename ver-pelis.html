<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Haz ver pelis</title>
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:; media-src * blob:; connect-src *;">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif}
header{position:sticky;top:0;z-index:50;background:#0a0a0fcc;backdrop-filter:blur(12px);border-bottom:1px solid #1a1a2e;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
input{flex:1;min-width:180px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:8px;padding:10px 14px;color:#e0e0e0;font-size:14px;outline:none;transition:border-color .2s}
input:focus{border-color:#f59e0b}
.categories{display:flex;gap:6px;flex-wrap:wrap}
.cat{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;transition:all .2s;color:#aaa}
.cat:hover,.cat.active{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:16px 20px}
@media(min-width:640px){.grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
.card{background:#12121e;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid #1a1a2e}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px #00000066;border-color:#f59e0b44}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#1a1a2e}
.card .info{padding:10px}
.card h3{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .year{font-size:11px;color:#666}
.card .rating{font-size:11px;color:#f59e0b}
.modal-overlay{position:fixed;inset:0;z-index:100;background:#000000cc;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#0a0a0f;border-radius:12px;width:100%;max-width:900px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;border:1px solid #2a2a3e}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #1a1a2e}
.modal-header h2{font-size:16px;font-weight:600}
.btn-close{background:none;border:none;color:#666;font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px}
.btn-close:hover{background:#1a1a2e;color:#e0e0e0}
.providers{display:flex;gap:6px;padding:10px 18px;flex-wrap:wrap;border-bottom:1px solid #1a1a2e}
.providers button{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;color:#aaa;transition:all .2s}
.providers button:hover,.providers button.active{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b}
.player-wrap{flex:1;min-height:60vh;background:#000;position:relative}
.player-wrap iframe{width:100%;height:100%;position:absolute;inset:0;border:none}
.loading{text-align:center;padding:60px 20px;color:#555;font-size:14px}
.spinner{width:32px;height:32px;border:3px solid #1a1a2e;border-top-color:#f59e0b;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:40px 20px;color:#ef4444;font-size:14px}
</style>
</head>
<body>
<header>
  <h1>▶ haz ver</h1>
  <input id="search" type="text" placeholder="Buscar película o serie...">
  <div class="categories" id="media-types" style="display:flex;gap:6px;flex-wrap:wrap;width:100%"></div>
  <div class="categories" id="categories" style="width:100%"></div>
</header>
<div class="grid" id="grid"></div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Cargando...</h2>
      <button class="btn-close" id="btn-close">&times;</button>
    </div>
    <div class="providers" id="providers"></div>
    <div style="display:flex;gap:6px;padding:6px 18px;border-bottom:1px solid #1a1a2e;flex-wrap:wrap;align-items:center">
      <span style="font-size:11px;color:#555;margin-right:4px">IDIOMA</span>
      <button class="lang-btn active" data-lang="es" onclick="switchLang('es')" style="background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:#f59e0b;border-color:#f59e0b">ESP</button>
      <button class="lang-btn" data-lang="en" onclick="switchLang('en')" style="background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:#aaa">ENG</button>
      <button class="lang-btn" data-lang="es-sub" onclick="switchLang('es-sub')" style="background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:#aaa">SUB ESP</button>
    </div>
    <div class="episode-picker" id="episode-picker" style="display:none;padding:8px 18px;border-bottom:1px solid #1a1a2e;gap:8px;flex-wrap:wrap;align-items:center">
      <label style="font-size:12px;color:#aaa">Temporada</label>
      <select id="season-select" style="background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:4px 8px;color:#e0e0e0;font-size:12px"></select>
      <label style="font-size:12px;color:#aaa">Episodio</label>
      <select id="episode-select" style="background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:4px 8px;color:#e0e0e0;font-size:12px"></select>
    </div>
    <div class="player-wrap" id="player-wrap"><div class="loading" id="player-loading"><div class="spinner"></div></div></div>
  </div>
</div>
<script>
// ─── TMDB ────────────────────────────────────────────────────
const TMDB_KEY = '8265bd1679663a7ea12ac168da84d2e8'
const TMDB_IMG = 'https://image.tmdb.org/t/p/w185'

const TMDB = {
  movie: {
    trending: page => `https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_KEY}&page=${page}`,
    popular: page => `https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_KEY}&page=${page}&region=AR`,
    upcoming: page => `https://api.themoviedb.org/3/movie/upcoming?api_key=${TMDB_KEY}&page=${page}&region=AR`,
    topRated: page => `https://api.themoviedb.org/3/movie/top_rated?api_key=${TMDB_KEY}&page=${page}`,
  },
  tv: {
    trending: page => `https://api.themoviedb.org/3/trending/tv/week?api_key=${TMDB_KEY}&page=${page}`,
    popular: page => `https://api.themoviedb.org/3/tv/popular?api_key=${TMDB_KEY}&page=${page}&region=AR`,
    airing: page => `https://api.themoviedb.org/3/tv/on_the_air?api_key=${TMDB_KEY}&page=${page}`,
    topRated: page => `https://api.themoviedb.org/3/tv/top_rated?api_key=${TMDB_KEY}&page=${page}`,
  },
  search: q => `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&page=1&region=AR`,
  tvDetail: id => `https://api.themoviedb.org/3/tv/${id}?api_key=${TMDB_KEY}`,
  tvSeason: (id, s) => `https://api.themoviedb.org/3/tv/${id}/season/${s}?api_key=${TMDB_KEY}`,
}

// ─── Providers ──────────────────────────────────────────────
// TMDB ID → iframe URL. Providers verified to return 200 + no XFO.
const PROVIDERS = [
  { id: 'vidsrc',   name: 'VidSrc',  movie: id => `https://vidsrc.mov/embed/movie/${id}`,                 tv: (id,s,e) => `https://vidsrc.mov/embed/tv/${id}/${s}/${e}` },
  { id: 'vidsrcto', name: 'VidSrc.to', movie: id => `https://vidsrc.to/embed/movie/${id}`,                tv: (id,s,e) => `https://vidsrc.to/embed/tv/${id}/${s}/${e}` },
  { id: 'vsembed',  name: 'VsEmbed', movie: id => `https://vsembed.su/embed/movie/${id}`,                tv: (id,s,e) => `https://vsembed.su/embed/tv/${id}/${s}/${e}` },
  { id: 'vidlink',  name: 'VidLink', movie: id => `https://vidlink.pro/movie/${id}`,                      tv: (id,s,e) => `https://vidlink.pro/tv/${id}/${s}/${e}` },
  { id: 'vidfast',  name: 'VidFast', movie: id => `https://vidfast.pro/movie/${id}`,                      tv: (id,s,e) => `https://vidfast.pro/tv/${id}/${s}/${e}` },
  { id: 'videasy',  name: 'Videasy', movie: id => `https://player.videasy.net/movie/${id}`,               tv: (id,s,e) => `https://player.videasy.net/tv/${id}/${s}/${e}` },
  { id: 'vidsrcsu', name: 'VidSrc.su', movie: id => `https://vidsrc.su/embed/movie/${id}`,               tv: (id,s,e) => `https://vidsrc.su/embed/tv/${id}/${s}/${e}` },
  { id: 'ezvidapi', name: 'EZVidAPI', movie: id => `https://ezvidapi.com/embed/movie/${id}`,             tv: (id,s,e) => `https://ezvidapi.com/embed/tv/${id}/${s}/${e}` },
  { id: 'streamsrc',name: 'StreamSrc',movie: id => `https://streamsrc.cc/watch/movie/${id}`,              tv: (id,s,e) => `https://streamsrc.cc/watch/series/${id}?s=${s}&e=${e}` },
  { id: 'autoembed',name: 'AutoEmbed',movie: id => `https://autoembed.co/movie/tmdb/${id}`,              tv: (id,s,e) => `https://autoembed.co/tv/tmdb/${id}-${s}-${e}` },
  { id: 'vidpop',   name: 'VidPop',  movie: id => `https://www.vidpop.xyz/embed/?id=${id}`,              tv: (id,s,e) => `https://www.vidpop.xyz/embed/?id=${id}&season=${s}&episode=${e}` },
]

// ─── Ad Blocker ──────────────────────────────────────────────
// Bloqueo TOTAL de popups, ventanas, redirecciones y publicidad

// 1. Bloquear window.open (TODO popup, incondicional)
const _origOpen = window.open
window.open = function() { return null }

// 2. Bloquear target="_blank" en nuestra página
document.addEventListener('click', e => {
  let el = e.target
  while (el && el !== document.body) {
    if (el.tagName === 'A' && (el.target === '_blank' || el.target === '_new')) {
      if (!el.closest('#modal') && !el.closest('header')) {
        e.preventDefault()
        e.stopPropagation()
        return
      }
    }
    el = el.parentElement
  }
}, true)

// 3. MutationObserver + interval: elimina cualquier elemento publicitario inyectado
const AD_KEYWORDS = ['popup','pop-up','popunder','pop-under','advert','adser','adunit',
  'banner','ad-','ads-','_ads','doubleclick','googleads','taboola','outbrain',
  'propeller','exoclick','popads','histats','cloustore','cloudnestra']

function isAdElement(el) {
  if (el.tagName === 'IFRAME') {
    if (!el.closest('#player-wrap') && !el.closest('.modal')) return true
  }
  if (el.tagName === 'SCRIPT') {
    const src = el.src || ''
    if (src && AD_KEYWORDS.some(k => src.includes(k))) return true
  }
  if (el.classList) {
    for (const cls of el.classList) {
      if (AD_KEYWORDS.some(k => cls.includes(k))) return true
    }
  }
  if (el.id && AD_KEYWORDS.some(k => el.id.includes(k))) return true
  return false
}

function killAds() {
  if (!document.getElementById('modal')?.classList.contains('open')) return
  document.querySelectorAll('iframe:not(#player-wrap iframe), script, div, ins').forEach(el => {
    try {
      if (isAdElement(el)) el.remove()
    } catch {}
  })
  // Elimina cualquier div posicionado fijo que no sea nuestro modal
  document.querySelectorAll('div').forEach(el => {
    try {
      const cs = getComputedStyle(el)
      if ((cs.position === 'fixed' || cs.position === 'sticky') &&
          !el.closest('#modal') && !el.closest('header') &&
          el.offsetHeight > 50 && el.offsetWidth > 50) {
        el.remove()
      }
    } catch {}
  })
}

const adObserver = new MutationObserver(killAds)
adObserver.observe(document.body, { childList: true, subtree: true, attributes: false })
setInterval(killAds, 1500)

// ─── State ──────────────────────────────────────────────────
let allItems = []
let currentId = null
let currentType = 'movie'
let currentProvider = PROVIDERS[0]
let currentCategory = 'trending'
let currentMediaType = 'movie'
let currentSeason = 1
let currentEpisode = 1
let currentLang = 'es'

// ─── DOM refs ───────────────────────────────────────────────
const $ = s => document.querySelector(s)
const grid = $('#grid')
const search = $('#search')
const modal = $('#modal')
const modalTitle = $('#modal-title')
const providersEl = $('#providers')
const playerWrap = $('#player-wrap')
const btnClose = $('#btn-close')
const categories = $('#categories')
const mediaTypes = $('#media-types')

// ─── Categories ─────────────────────────────────────────────
const MEDIA_TYPES = [
  { id: 'movie', label: 'Películas' },
  { id: 'tv', label: 'Series' },
]
const CATEGORIES = {
  movie: [
    { id: 'trending', label: 'Tendencias' },
    { id: 'popular', label: 'Populares' },
    { id: 'upcoming', label: 'Próximos' },
    { id: 'topRated', label: 'Mejor puntuadas' },
  ],
  tv: [
    { id: 'trending', label: 'Tendencias' },
    { id: 'popular', label: 'Populares' },
    { id: 'airing', label: 'Al aire' },
    { id: 'topRated', label: 'Mejor puntuadas' },
  ],
}

// Render media type toggle + first category buttons
function renderCategories() {
  mediaTypes.innerHTML = MEDIA_TYPES.map(mt =>
    `<button class="cat ${mt.id === currentMediaType ? 'active' : ''}" onclick="switchMediaType('${mt.id}')">${mt.label}</button>`
  ).join('')
  const cats = CATEGORIES[currentMediaType] || CATEGORIES.movie
  currentCategory = cats[0].id
  categories.innerHTML = cats.map(c =>
    `<button class="cat ${c.id === currentCategory ? 'active' : ''}" onclick="switchCategory('${c.id}')">${c.label}</button>`
  ).join('')
}

window.switchMediaType = function(mt) {
  currentMediaType = mt
  currentCategory = CATEGORIES[mt][0].id
  const cats = CATEGORIES[mt]
  mediaTypes.querySelectorAll('button').forEach(b => b.classList.remove('active'))
  mediaTypes.querySelector(`[onclick*="${mt}"]`)?.classList.add('active')
  categories.innerHTML = cats.map(c =>
    `<button class="cat ${c.id === currentCategory ? 'active' : ''}" onclick="switchCategory('${c.id}')">${c.label}</button>`
  ).join('')
  search.value = ''
  loadContent()
}

window.switchCategory = function(id) {
  currentCategory = id
  categories.querySelectorAll('button').forEach(b => b.classList.remove('active'))
  categories.querySelector(`[onclick*="${id}"]`)?.classList.add('active')
  search.value = ''
  loadContent()
}

// ─── API ────────────────────────────────────────────────────
async function fetchContent(category, mediaType, page = 1) {
  const endpoints = TMDB[mediaType]
  const url = endpoints && endpoints[category] ? endpoints[category](page) : TMDB.movie.trending(page)
  const res = await fetch(url)
  if (!res.ok) throw new Error(`HTTP ${res.status}`)
  const data = await res.json()
  return data.results || []
}

async function searchContent(query) {
  const res = await fetch(TMDB.search(query))
  if (!res.ok) throw new Error('search fail')
  const data = await res.json()
  return data.results || []
}

// ─── Render ─────────────────────────────────────────────────
function renderItems(items) {
  grid.innerHTML = items.length
    ? items.map(m => {
        const isTv = m.media_type === 'tv' || currentMediaType === 'tv'
        const title = isTv ? (m.name || m.original_name) : (m.title || m.original_title || 'Sin título')
        const year = (m.release_date || m.first_air_date || '').slice(0,4) || ''
        const rating = m.vote_average ? m.vote_average.toFixed(1) : ''
        const typeLabel = isTv ? 'SERIE' : 'PELI'
        const img = m.poster_path
          ? `${TMDB_IMG}${m.poster_path}`
          : 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 185 278"><rect fill="%231a1a2e" width="185" height="278"/><text x="50%" y="50%" fill="%23444" font-size="40" text-anchor="middle" dy=".35em">🎬</text></svg>'
        return `<div class="card" onclick="openPlayer(${m.id},'${isTv ? 'tv' : 'movie'}')">
          <img src="${img}" loading="lazy" alt="${title}">
          <div class="info">
            <h3>${title}</h3>
            <div><span class="year">${year}</span>${rating ? ` <span class="rating">★ ${rating}</span>` : ''} <span style="font-size:10px;color:#f59e0b">${typeLabel}</span></div>
          </div>
        </div>`
      }).join('')
    : '<div class="error">Sin resultados 😕</div>'
}

async function loadContent(category, mediaType, page = 1) {
  category = category || currentCategory
  mediaType = mediaType || currentMediaType
  grid.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>'
  try {
    const items = await fetchContent(category, mediaType, page)
    allItems = items
    renderItems(items)
  } catch (e) {
    grid.innerHTML = '<div class="error">Error al cargar. Probá recargar la página.</div>'
  }
}

// ─── Player ─────────────────────────────────────────────────
window.openPlayer = function(id, type = 'movie', season, episode) {
  currentId = id
  currentType = type
  currentSeason = season || 1
  currentEpisode = episode || 1
  modal.classList.add('open')
  modalTitle.textContent = 'Cargando...'

  providersEl.innerHTML = PROVIDERS.map(p =>
    `<button class="${p.id === currentProvider.id ? 'active' : ''}" onclick="switchProvider('${p.id}')">${p.name}</button>`
  ).join('')

  // Episode picker for series
  const picker = document.getElementById('episode-picker')
  const sSel = document.getElementById('season-select')
  const eSel = document.getElementById('episode-select')
  if (type === 'tv') {
    picker.style.display = 'flex'
    // Fetch seasons from TMDB
    fetch(TMDB.tvDetail(id))
      .then(r => r.json())
      .then(d => {
        const seasons = (d.seasons || []).filter(s => s.season_number > 0)
        if (seasons.length) {
          sSel.innerHTML = seasons.map(s => `<option value="${s.season_number}" ${s.season_number === currentSeason ? 'selected' : ''}>${s.season_number} — ${s.name || 'Temporada ' + s.season_number}</option>`).join('')
          loadEpisodes(id, seasons[0].season_number)
        } else {
          sSel.innerHTML = `<option value="1">Temporada 1</option>`
          eSel.innerHTML = `<option value="1">Episodio 1</option>`
        }
      })
      .catch(() => {
        sSel.innerHTML = `<option value="1">Temporada 1</option>`
        eSel.innerHTML = `<option value="1">Episodio 1</option>`
      })
  } else {
    picker.style.display = 'none'
  }

  loadStream(id, type, currentSeason, currentEpisode)
}

function loadEpisodes(tvId, seasonNum) {
  const eSel = document.getElementById('episode-select')
  fetch(TMDB.tvSeason(tvId, seasonNum))
    .then(r => r.json())
    .then(d => {
      const eps = d.episodes || []
      if (eps.length) {
        eSel.innerHTML = eps.map(e => `<option value="${e.episode_number}" ${e.episode_number === currentEpisode ? 'selected' : ''}>${e.episode_number} — ${e.name || 'Episodio ' + e.episode_number}</option>`).join('')
      } else {
        eSel.innerHTML = `<option value="1">Episodio 1</option>`
      }
    })
    .catch(() => {
      eSel.innerHTML = `<option value="1">Episodio 1</option>`
    })
}

// Season/episode select change → reload player
document.getElementById('season-select').addEventListener('change', function() {
  currentSeason = parseInt(this.value)
  currentEpisode = 1
  document.getElementById('episode-select').value = '1'
  loadEpisodes(currentId, currentSeason)
  // Don't auto-reload — let user pick episode first
})
document.getElementById('episode-select').addEventListener('change', function() {
  currentEpisode = parseInt(this.value)
  if (currentId) loadStream(currentId, currentType, currentSeason, currentEpisode)
})

window.switchLang = function(lang) {
  currentLang = lang
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.style.color = b.dataset.lang === lang ? '#f59e0b' : '#aaa'
    b.style.borderColor = b.dataset.lang === lang ? '#f59e0b' : '#2a2a3e'
  })
  if (currentId) loadStream(currentId, currentType, currentSeason, currentEpisode)
}

function switchProvider(providerId) {
  currentProvider = PROVIDERS.find(p => p.id === providerId) || PROVIDERS[0]
  providersEl.querySelectorAll('button').forEach(b => b.classList.remove('active'))
  providersEl.querySelector(`[onclick*="${providerId}"]`)?.classList.add('active')
  loadStream(currentId, currentType, currentSeason, currentEpisode)
}

function langParam(url, lang) {
  if (lang === 'en' || !lang) return url
  const sep = url.includes('?') ? '&' : '?'
  if (lang === 'es') return url + sep + 'lang=es'
  if (lang === 'es-sub') return url + sep + 'lang=es&sub=es'
  return url
}

function loadStream(id, type, season, episode) {
  let url = type === 'movie'
    ? currentProvider.movie(id)
    : currentProvider.tv(id, season || 1, episode || 1)
  url = langParam(url, currentLang)
  playerWrap.innerHTML = '<div class="loading" id="player-loading"><div class="spinner"></div>Cargando reproductor...</div>'
  const iframe = document.createElement('iframe')
  iframe.allow = 'autoplay; fullscreen; picture-in-picture'
  iframe.allowFullscreen = true
  iframe.onload = () => {
    const loading = document.getElementById('player-loading')
    if (loading) loading.remove()
  }
  iframe.onerror = () => {
    playerWrap.innerHTML = '<div class="error">Error al cargar. Probá otro provider.</div>'
  }
  iframe.src = url
  playerWrap.appendChild(iframe)
}

// ─── Search ─────────────────────────────────────────────────
let searchTimer
search.addEventListener('input', () => {
  clearTimeout(searchTimer)
  searchTimer = setTimeout(async () => {
    const q = search.value.trim()
    if (!q) { loadContent(); return }
    grid.innerHTML = '<div class="loading"><div class="spinner"></div>Buscando...</div>'
    try {
      const results = await searchContent(q)
      renderItems(results)
    } catch {
      renderItems(allItems.filter(m => {
        const title = m.media_type === 'tv' ? (m.name || '') : (m.title || '')
        return title.toLowerCase().includes(q.toLowerCase())
      }))
    }
  }, 400)
})

// ─── Close modal ────────────────────────────────────────────
btnClose.addEventListener('click', () => modal.classList.remove('open'))
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open') })
document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.classList.remove('open') })

// ─── Init ───────────────────────────────────────────────────
renderCategories()
loadContent()
</script>
</body>
</html>
