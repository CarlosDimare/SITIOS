<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Haz ver pelis</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif}
header{position:sticky;top:0;z-index:50;background:#0a0a0fcc;backdrop-filter:blur(12px);border-bottom:1px solid #1a1a2e;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
input{flex:1;min-width:180px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:8px;padding:10px 14px;color:#e0e0e0;font-size:14px;outline:none}
input:focus{border-color:#f59e0b}
.cats{display:flex;gap:6px;flex-wrap:wrap}
.cats button{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;color:#aaa;transition:all .2s}
.cats button:hover,.cats button.active{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:16px 20px}
@media(min-width:640px){.grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
.card{background:#12121e;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .2s;border:1px solid #1a1a2e}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px #000;border-color:#f59e0b44}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#1a1a2e}
.card .info{padding:10px}
.card h3{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .yr{font-size:11px;color:#666}
.modal-overlay{position:fixed;inset:0;z-index:100;background:#000000dd;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#0a0a0f;border-radius:12px;width:100%;max-width:960px;max-height:94vh;overflow:hidden;display:flex;flex-direction:column;border:1px solid #2a2a3e}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1a1a2e;gap:12px}
.modal-header h2{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-close{background:none;border:none;color:#666;font-size:24px;cursor:pointer;padding:4px 10px;border-radius:6px;flex-shrink:0}
.btn-close:hover{background:#1a1a2e;color:#e0e0e0}
.servers{display:flex;gap:6px;padding:8px 16px;flex-wrap:wrap;border-bottom:1px solid #1a1a2e}
.servers button{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;color:#888;transition:all .2s}
.servers button:hover,.servers button.active{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b}
.player-wrap{flex:1;min-height:55vh;background:#000;position:relative}
.player-wrap iframe{width:100%;height:100%;position:absolute;inset:0;border:none}
.loading{text-align:center;padding:60px 20px;color:#555;font-size:14px}
.spin{width:32px;height:32px;border:3px solid #1a1a2e;border-top-color:#f59e0b;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 12px}
@keyframes s{to{transform:rotate(360deg)}}
.err{text-align:center;padding:50px 20px}
.err p{color:#ef4444;font-size:14px;margin-bottom:12px}
.err button{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:8px 20px;color:#aaa;cursor:pointer;font-size:13px}
.err button:hover{border-color:#f59e0b;color:#f59e0b}
</style>
</head>
<body>
<header>
  <h1>▶ haz ver</h1>
  <input id="q" type="text" placeholder="Buscar...">
  <div class="cats" id="cats"></div>
</header>
<div class="grid" id="grid"></div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="mtitle">Seleccioná un servidor</h2>
      <button class="btn-close" id="btn-close">&times;</button>
    </div>
    <div class="servers" id="servers"></div>
    <div class="player-wrap" id="pw"><div class="loading"><div class="spin"></div><div style="margin-top:8px;color:#666;font-size:12px">Hacé click en una peli para empezar</div></div></div>
  </div>
</div>
<script>
const KEY = '8265bd1679663a7ea12ac168da84d2e8'
const IMG = 'https://image.tmdb.org/t/p/w185'

// Solo providers que confirmé que funcionan
const PROVIDERS = [
  {id:'vidsrc', name:'VidSrc',   url: id => `https://vidsrc.mov/embed/movie/${id}`},
  {id:'vidlink',name:'VidLink',  url: id => `https://vidlink.pro/movie/${id}`},
  {id:'vidfast',name:'VidFast',  url: id => `https://vidfast.pro/movie/${id}?autoPlay=true`},
  {id:'videasy',name:'Videasy',  url: id => `https://player.videasy.net/movie/${id}`},
  {id:'ezvid',  name:'EZVidAPI',url: id => `https://ezvidapi.com/embed/movie/${id}`},
  {id:'vidking',name:'VidKing',  url: id => `https://www.vidking.net/embed/movie/${id}`},
  {id:'vidsrcto',name:'VidSrc.to',url: id => `https://vidsrc.to/embed/movie/${id}`},
  {id:'vidsrccc',name:'VidSrc.cc',url: id => `https://vidsrc.cc/v2/embed/movie/${id}`},
]

const $ = s => document.querySelector(s)
let curProv = PROVIDERS[0], cat = 'now_playing'

function tmdb(path) {
  return fetch(`https://api.themoviedb.org/3/${path}&api_key=${KEY}&language=es`).then(r=>{if(!r.ok)throw Error();return r.json()})
}

async function loadList(type, page=1) {
  $('#grid').innerHTML = '<div class="loading"><div class="spin"></div>Cargando...</div>'
  try {
    const d = await tmdb(`movie/${type}&page=${page}`)
    render(d.results||d)
  } catch(e) {
    $('#grid').innerHTML = '<div class="err"><p>Error al cargar 😕</p><button onclick="loadList(cat)">Reintentar</button></div>'
  }
}

function render(items) {
  $('#grid').innerHTML = items.map(m => {
    const t = m.title || m.name || ''
    const y = (m.release_date||m.first_air_date||'').slice(0,4)
    const p = m.poster_path ? `${IMG}${m.poster_path}` : ''
    const id = m.id
    return `<div class="card" data-id="${id}" onclick="abrir(${id})">
      <img src="${p}" loading="lazy" alt="${t}" onerror="this.parentNode.querySelector('.info h3').textContent='${t.replace(/'/g,"\\'")}'">
      <div class="info"><h3>${t}</h3><span class="yr">${y}</span></div>
    </div>`
  }).join('')
}

function abrir(id) {
  curProv = PROVIDERS[0]
  ultimoId = id
  $('#modal').classList.add('open')
  $('#servers').innerHTML = PROVIDERS.map(p =>
    `<button class="${p.id==curProv.id?'active':''}" onclick="cambiar('${p.id}')">${p.name}</button>`
  ).join('')
  cargar(id)
}

function cambiar(pid) {
  curProv = PROVIDERS.find(p=>p.id===pid) || PROVIDERS[0]
  $('#servers').querySelectorAll('button').forEach(b=>b.classList.remove('active'))
  const btn = [...$('#servers').querySelectorAll('button')].find(b=>b.textContent===curProv.name)
  if (btn) btn.classList.add('active')
  cargar()  // reuse ultimoId
}

// Keep track of last loaded TMDB id
let ultimoId = null

function cargar(id) {
  if (id) ultimoId = id
  id = id || ultimoId
  if (!id) return

  const pw = $('#pw')
  pw.innerHTML = '<div class="loading"><div class="spin"></div>Cargando reproductor...</div>'

  const url = curProv.url(id)
  const ifr = document.createElement('iframe')
  ifr.src = url
  ifr.allow = 'autoplay; encrypted-media; fullscreen; picture-in-picture'
  ifr.allowFullscreen = true
  ifr.style.cssText = 'width:100%;height:100%;position:absolute;inset:0;border:none'

  // Clear and append
  pw.innerHTML = ''
  pw.appendChild(ifr)
}

// Close modal
$('#btn-close').onclick = () => $('#modal').classList.remove('open')
$('#modal').onclick = e => { if (e.target === $('#modal')) $('#modal').classList.remove('open') }
document.addEventListener('keydown', e => { if (e.key === 'Escape') $('#modal').classList.remove('open') })

// Categories
const CATS = {now_playing:'Estrenos',popular:'Populares',top_rated:'Mejor puntuadas',upcoming:'Próximos'}
let buf
$('#cats').innerHTML = Object.entries(CATS).map(([k,v]) =>
  `<button onclick="cat='${k}';loadList('${k}');this.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));this.classList.add('active')" class="${k==cat?'active':''}">${v}</button>`
).join('')

// Search
$('#q').addEventListener('input', function() {
  clearTimeout(buf)
  const v = this.value.trim()
  if (!v) { loadList(cat); return }
  buf = setTimeout(async () => {
    $('#grid').innerHTML = '<div class="loading"><div class="spin"></div>Buscando...</div>'
    try {
      const d = await tmdb(`search/multi?query=${encodeURIComponent(v)}&page=1`)
      const items = (d.results||[]).filter(x => x.media_type !== 'person')
      render(items.length ? items : d.results||[])
    } catch(e) { loadList(cat) }
  }, 400)
})

loadList('now_playing')
</script>
</body>
</html>
